<style>
  :root {
    --bg: #07111f;
    --panel: #101827;
    --panel-soft: #182235;
    --text: #f8fafc;
    --muted: #cbd5e1;
    --accent: #38bdf8;
    --accent-dark: #0284c7;
    --warning: #f59e0b;
    --danger: #ef4444;
    --success: #22c55e;
    --border: rgba(148, 163, 184, 0.28);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .hero {
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 44px 20px;
    border-bottom: 1px solid var(--border);
    background:
      linear-gradient(rgba(7, 17, 31, 0.22), rgba(7, 17, 31, 0.92)),
      radial-gradient(circle at 18% 78%, rgba(245, 158, 11, 0.26), transparent 26%),
      radial-gradient(circle at 72% 18%, rgba(56, 189, 248, 0.22), transparent 28%),
      linear-gradient(135deg, #061827 0%, #083344 38%, #064e3b 68%, #111827 100%);
    position: relative;
    overflow: hidden;
  }

  .hero:before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 88px;
    background:
      linear-gradient(160deg, transparent 0 42%, rgba(15, 23, 42, 0.72) 43% 100%),
      linear-gradient(25deg, transparent 0 58%, rgba(2, 6, 23, 0.55) 59% 100%);
    opacity: 0.75;
  }

  .hero-overlay {
    max-width: 1100px;
    position: relative;
    z-index: 1;
  }

  .hero-kicker {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #bae6fd;
    font-weight: 900;
    margin-bottom: 10px;
  }

  .hero h1 {
    margin: 0;
    font-size: clamp(46px, 7vw, 88px);
    letter-spacing: 2px;
    font-weight: 900;
    line-height: 0.95;
  }

  .hero h2 {
    margin: 14px 0 8px;
    font-size: clamp(26px, 4vw, 48px);
    color: var(--accent);
  }

  .hero p {
    margin: 0;
    font-size: clamp(16px, 2vw, 22px);
    color: var(--muted);
    font-weight: 800;
  }

  .app-shell {
    max-width: 1220px;
    margin: 0 auto;
    padding: 30px 20px 70px;
  }

  .notice {
    background: rgba(56, 189, 248, 0.12);
    border: 1px solid rgba(56, 189, 248, 0.35);
    padding: 16px;
    border-radius: 14px;
    color: var(--muted);
  }

  .hidden { display: none !important; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }

  .section-header h2 {
    margin: 0;
    font-size: 34px;
  }

  .subtle,
  .meta {
    color: var(--muted);
    line-height: 1.5;
  }

  button {
    border: 0;
    border-radius: 12px;
    padding: 12px 16px;
    font-weight: 900;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  button.primary {
    background: var(--accent);
    color: #03131f;
  }

  button.secondary {
    background: var(--panel-soft);
    color: var(--text);
    border: 1px solid var(--border);
  }

  button.danger {
    background: var(--danger);
    color: #fff;
  }

  button.wide { width: 100%; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }

  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)), var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.24);
  }

  .adventure-card {
    overflow: hidden;
    padding: 0;
  }

  .adventure-card .card-body {
    padding: 18px;
  }

  .adventure-image {
    min-height: 136px;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(2, 6, 23, 0.05), rgba(2, 6, 23, 0.72)),
      radial-gradient(circle at 18% 78%, rgba(245, 158, 11, 0.24), transparent 24%),
      radial-gradient(circle at 80% 18%, rgba(56, 189, 248, 0.22), transparent 28%),
      linear-gradient(135deg, #082f49 0%, #075985 38%, #064e3b 72%, #111827 100%);
  }

  .adventure-image:before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(155deg, transparent 0 55%, rgba(15, 23, 42, 0.50) 56% 100%),
      linear-gradient(28deg, transparent 0 64%, rgba(2, 6, 23, 0.42) 65% 100%);
    opacity: 0.85;
  }

  .adventure-icon {
    display: none;
  }

  .image-shade {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(15,23,42,0.02), rgba(15,23,42,0.75));
    z-index: 1;
  }

  .adventure-type-tubing .adventure-image {
    background:
      linear-gradient(180deg, rgba(2,6,23,0.02), rgba(2,6,23,0.70)),
      radial-gradient(circle at 24% 74%, rgba(125, 211, 252, 0.24), transparent 24%),
      linear-gradient(150deg, #075985 0%, #0e7490 48%, #064e3b 100%);
  }

  .adventure-type-camping .adventure-image,
  .adventure-type-bonfire .adventure-image {
    background:
      linear-gradient(180deg, rgba(2,6,23,0.04), rgba(2,6,23,0.72)),
      radial-gradient(circle at 26% 76%, rgba(245,158,11,0.34), transparent 22%),
      linear-gradient(150deg, #052e16 0%, #14532d 56%, #111827 100%);
  }

  .adventure-type-fishing .adventure-image,
  .adventure-type-ice-fishing .adventure-image {
    background:
      linear-gradient(180deg, rgba(2,6,23,0.04), rgba(2,6,23,0.72)),
      radial-gradient(circle at 76% 22%, rgba(186,230,253,0.28), transparent 21%),
      linear-gradient(150deg, #0f766e 0%, #075985 54%, #0f172a 100%);
  }

  .adventure-type-hunting .adventure-image {
    background:
      linear-gradient(180deg, rgba(2,6,23,0.04), rgba(2,6,23,0.75)),
      radial-gradient(circle at 76% 24%, rgba(217,119,6,0.28), transparent 22%),
      linear-gradient(150deg, #422006 0%, #365314 52%, #111827 100%);
  }

  .adventure-type-atv-utv-ride .adventure-image,
  .adventure-type-motorcycle-ride .adventure-image {
    background:
      linear-gradient(180deg, rgba(2,6,23,0.04), rgba(2,6,23,0.75)),
      radial-gradient(circle at 26% 74%, rgba(245,158,11,0.25), transparent 23%),
      linear-gradient(150deg, #78350f 0%, #064e3b 50%, #111827 100%);
  }

  .adventure-type-bowling .adventure-image,
  .adventure-type-concert .adventure-image,
  .adventure-type-sporting-event .adventure-image,
  .adventure-type-rodeo .adventure-image,
  .adventure-type-community-gathering .adventure-image {
    background:
      linear-gradient(180deg, rgba(2,6,23,0.04), rgba(2,6,23,0.75)),
      radial-gradient(circle at 24% 66%, rgba(236,72,153,0.20), transparent 24%),
      radial-gradient(circle at 78% 24%, rgba(56,189,248,0.24), transparent 22%),
      linear-gradient(150deg, #312e81 0%, #111827 100%);
  }

  .card h3 {
    margin: 0 0 8px;
    font-size: 25px;
  }

  .card-topline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .badge,
  .status-badge,
  .mini-badge {
    display: inline-block;
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 900;
  }

  .badge {
    background: rgba(56, 189, 248, 0.14);
    color: var(--accent);
    margin-bottom: 10px;
  }

  .mini-badge {
    background: rgba(56, 189, 248, 0.12);
    color: #bae6fd;
    border: 1px solid rgba(56, 189, 248, 0.20);
  }

  .status-draft {
    background: rgba(245, 158, 11, 0.16);
    color: #fbbf24;
  }

  .status-published {
    background: rgba(34, 197, 94, 0.16);
    color: #86efac;
  }

  .status-closed,
  .status-cancelled {
    background: rgba(239, 68, 68, 0.16);
    color: #fca5a5;
  }

  .status-complete {
    background: rgba(148, 163, 184, 0.18);
    color: #cbd5e1;
  }

  .adventure-facts {
    display: grid;
    gap: 8px;
    margin: 12px 0;
  }

  .adventure-facts div {
    display: grid;
    grid-template-columns: 28px minmax(0, 1fr);
    gap: 8px;
    align-items: start;
    color: var(--muted);
    line-height: 1.35;
  }

  .adventure-facts strong {
    color: var(--text);
    font-weight: 800;
  }

  .card-blurb {
    color: var(--muted);
    line-height: 1.5;
    margin: 12px 0 16px;
  }

  .admin-actions {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 12px;
  }

  .empty-state {
    border: 1px dashed var(--border);
    border-radius: 18px;
    padding: 30px;
    color: var(--muted);
    text-align: center;
  }

  .form-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 18px;
  }

  .registration-card {
    max-width: 900px;
    margin: 0 auto;
  }

  .payment-panel {
    background: rgba(2, 6, 23, 0.45);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin: 18px 0;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 16px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-weight: 900;
    margin-bottom: 6px;
  }

  input,
  select,
  textarea {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #020617;
    color: var(--text);
    padding: 12px;
    font-size: 16px;
  }

  textarea {
    min-height: 110px;
    resize: vertical;
    margin-bottom: 14px;
  }

  .checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 10px;
    margin: 16px 0;
  }

  .acknowledgement-box {
    display: grid;
    gap: 10px;
    margin: 16px 0 20px;
  }

  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    line-height: 1.35;
  }

  .check-item input {
    width: 22px;
    height: 22px;
    flex: 0 0 auto;
    margin-top: 1px;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  .vertical-actions { flex-direction: column; }

  a { color: #7dd3fc; }

  .detail-card { background: transparent; }

  .detail-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .detail-hero-mini {
    background:
      linear-gradient(135deg, rgba(56, 189, 248, 0.18), rgba(245, 158, 11, 0.12)),
      var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 26px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 18px;
  }

  .detail-hero-mini h2 {
    font-size: clamp(32px, 5vw, 58px);
    margin: 10px 0 8px;
  }

  .detail-hero-mini p {
    color: var(--muted);
    margin: 0;
    font-size: 18px;
  }

  .detail-stats {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .stat-pill {
    background: rgba(15, 23, 42, 0.75);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 14px;
    min-width: 120px;
    text-align: center;
  }

  .stat-pill strong {
    display: block;
    font-size: 20px;
    color: var(--accent);
  }

  .stat-pill span {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    gap: 18px;
  }

  .detail-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
  }

  .detail-panel h3 {
    margin: 22px 0 8px;
  }

  .detail-panel h3:first-child { margin-top: 0; }

  .detail-panel p,
  .bring-list {
    color: var(--muted);
    line-height: 1.6;
  }

  .bring-list li { margin-bottom: 6px; }

  .side-panel {
    position: sticky;
    top: 14px;
    height: fit-content;
  }

  .registration-success {
    text-align: center;
    padding: 34px;
  }

  .registration-success h2 {
    font-size: 40px;
    margin: 0 0 12px;
  }

  .registration-success p {
    color: var(--muted);
    line-height: 1.6;
    font-size: 18px;
  }

  .inline-error {
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.4);
    color: #fecaca;
    padding: 12px;
    border-radius: 12px;
    margin: 12px 0;
  }

  @media (max-width: 860px) {
    .detail-grid { grid-template-columns: 1fr; }
    .detail-hero-mini {
      align-items: flex-start;
      flex-direction: column;
    }
    .detail-stats { justify-content: flex-start; }
    .side-panel { position: static; }
  }

  @media (max-width: 720px) {
    .form-grid,
    .form-row { grid-template-columns: 1fr; }

    .section-header {
      align-items: flex-start;
      flex-direction: column;
    }
  }


  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(2, 6, 23, 0.82);
    z-index: 9999;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 28px 16px;
    overflow: auto;
  }

  .modal-panel {
    width: min(1100px, 100%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.45);
    padding: 22px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 18px;
  }

  .modal-header h2 {
    margin: 0 0 6px;
    font-size: 28px;
  }

  .registration-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  .registration-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 880px;
    background: rgba(2, 6, 23, 0.35);
  }

  .registration-table th,
  .registration-table td {
    text-align: left;
    vertical-align: top;
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .registration-table th {
    color: var(--accent);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }

  .muted-small {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.4;
    white-space: pre-line;
  }


/* Launch UI polish */
body.modal-open {
  overflow: hidden;
}

button,
[role="button"],
input,
select,
textarea {
  touch-action: manipulation;
}

button:focus-visible,
[role="button"]:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 3px solid rgba(250, 204, 21, .55);
  outline-offset: 2px;
}

.modal-backdrop,
.qr-modal-overlay {
  overscroll-behavior: contain;
}

.modal-panel,
.qr-modal {
  box-sizing: border-box;
  max-height: calc(100dvh - 28px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.modal-actions,
.organizer-actions,
.command-center-actions,
.actions {
  align-items: center;
}

@media (max-width: 700px) {
  .modal-backdrop,
  .qr-modal-overlay {
    align-items: flex-end;
    padding: 0;
  }

  .modal-panel,
  .qr-modal,
  .registrations-modal,
  .email-modal,
  .event-timeline-modal {
    width: 100%;
    max-width: none;
    max-height: 92dvh;
    margin: 0;
    border-radius: 20px 20px 0 0;
  }

  .modal-header {
    position: sticky;
    top: 0;
    z-index: 2;
    padding-bottom: 12px;
    background: var(--panel, #111827);
  }

  .modal-actions,
  .organizer-actions,
  .command-center-actions {
    width: 100%;
  }

  .modal-actions button,
  .organizer-actions button,
  .command-center-actions button {
    min-height: 46px;
  }
}

@media (max-width: 520px) {
  .organizer-actions,
  .command-center-actions,
  .modal-actions {
    display: grid;
    grid-template-columns: 1fr;
  }

  .organizer-actions button,
  .command-center-actions button,
  .modal-actions button {
    width: 100%;
  }

  .dashboard-stat,
  .event-card button,
  .details-card button {
    min-height: 44px;
  }
}



  .retry-button {
    margin-top: 12px;
    min-width: 120px;
  }

  .empty-state .retry-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }


.featured-setting {
  border-color: rgba(245, 158, 11, .42);

}
.featured-badge {
  border-color: rgba(245, 158, 11, .45);

  /* Redline / IWP production theme */
  :root {
    --bg: #030806;
    --panel: #08110e;
    --panel-soft: #0d1814;
    --text: #f7f8f7;
    --muted: #b6bcb8;
    --accent: #1f9d3a;
    --accent-dark: #126f28;
    --warning: #d99a24;
    --danger: #e05252;
    --success: #2ba84a;
    --border: rgba(255, 255, 255, 0.14);
  }

  body {
    background:
      radial-gradient(circle at 82% 0%, rgba(31, 157, 58, 0.08), transparent 30rem),
      linear-gradient(180deg, #020504, #07100d 55%, #030806);
    color: var(--text);
  }

  .community-topbar {
    background: #020504 !important;
    border-bottom-color: var(--border) !important;
  }

  .community-topbar a {
    color: #d8dedb !important;
  }

  .hero {
    border-bottom-color: var(--border);
    background:
      linear-gradient(rgba(3, 8, 6, 0.28), rgba(3, 8, 6, 0.94)),
      radial-gradient(circle at 20% 80%, rgba(31, 157, 58, 0.20), transparent 27%),
      radial-gradient(circle at 76% 18%, rgba(31, 157, 58, 0.13), transparent 29%),
      linear-gradient(135deg, #020504 0%, #08110e 45%, #0d1814 72%, #030806 100%);
  }

  .hero-kicker {
    color: #91d5a0;
  }

  .hero h2 {
    color: var(--accent);
  }

  .notice {
    background: rgba(31, 157, 58, 0.08);
    border-color: rgba(31, 157, 58, 0.32);
  }

  button.primary,
  .primary,
  .button.primary {
    background: linear-gradient(135deg, #238d3b, #146d29) !important;
    border-color: transparent !important;
    color: #fff !important;
    box-shadow: 0 10px 28px rgba(18, 111, 40, 0.22);
  }

  button.primary:hover,
  .primary:hover,
  .button.primary:hover {
    background: linear-gradient(135deg, #2aa348, #187b30) !important;
  }

  button.secondary,
  .secondary,
  .button.secondary {
    background: rgba(255, 255, 255, 0.035) !important;
    border-color: var(--border) !important;
    color: var(--text) !important;
  }

  .card,
  .panel,
  .dashboard-card,
  .event-card,
  .modal-card,
  .form-card {
    background: linear-gradient(155deg, rgba(13, 24, 20, .97), rgba(5, 11, 8, .99)) !important;
    border-color: var(--border) !important;
  }

  input,
  select,
  textarea {
    background: #07100d !important;
    border-color: rgba(255, 255, 255, 0.18) !important;
    color: var(--text) !important;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: rgba(31, 157, 58, .70) !important;
    box-shadow: 0 0 0 3px rgba(31, 157, 58, .12) !important;
  }

  a {
    color: #78cf8c;
  }

  :focus-visible {
    outline-color: rgba(31, 157, 58, .75);
  }


  /* Organizer Command Center v2 */
  .command-center {
    margin: 28px 0 34px;
  }

  .command-center-hero {
    overflow: hidden;
    padding: clamp(22px, 3vw, 34px);
    border: 1px solid rgba(31, 157, 58, .32);
    border-radius: 22px;
    background:
      radial-gradient(circle at 88% 0%, rgba(31, 157, 58, .17), transparent 22rem),
      linear-gradient(145deg, rgba(13, 24, 20, .99), rgba(4, 10, 7, .99));
    box-shadow: 0 22px 55px rgba(0, 0, 0, .32);
  }

  .command-center-heading {

  .dashboard-health-strip {

    box-shadow: 0 0 0 5px rgba(148, 163, 184, .10);

    box-shadow: 0 0 0 5px rgba(217, 154, 36, .14);

  .dashboard-stats-v2 {
    grid-template-columns: repeat(5, minmax(0, 1fr));

  }

  .dashboard-stat {
    position: relative;
    overflow: hidden;
    min-height: 150px;

    content: "";
    position: absolute;
    right: -34px;
    bottom: -48px;
    width: 110px;
    height: 110px;
    border: 1px solid rgba(31, 157, 58, .10);

    gap: 18px;
    margin-top: 18px;
  }

  .dashboard-primary-grid {

  }

  .dashboard-work-grid {
    grid-template-columns: 1fr 1fr;
  }

  .dashboard-panel {
    border-radius: 20px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, .24);
  }

  .featured-dashboard-panel {
    border-color: rgba(217, 154, 36, .30) !important;
    background:
      radial-gradient(circle at 100% 0%, rgba(217, 154, 36, .09), transparent 17rem),
      linear-gradient(155deg, rgba(13, 24, 20, .98), rgba(5, 11, 8, .99)) !important;
  }

  .featured-dashboard-layout {
    display: grid;
    grid-template-columns: minmax(150px, .7fr) minmax(0, 1.3fr);
    gap: 20px;
    align-items: stretch;
  }

  .featured-dashboard-image {
    min-height: 185px;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 15px;
    background: #07100d;
  }

  .featured-dashboard-image img {
    width: 100%;
    height: 100%;
    min-height: 185px;
    object-fit: cover;
  }

  .featured-dashboard-fallback {
    display: grid;
    place-items: center;
    font-size: 3.8rem;
  }

  .featured-dashboard-details,
  .next-event-details {
    display: grid;
    gap: 10px;
  }

  .next-event-details > div {
    display: grid;
    grid-template-columns: 28px minmax(0, 1fr);
    gap: 9px;
    align-items: center;
    min-height: 42px;
    padding: 8px 11px;
    border: 1px solid rgba(255, 255, 255, .09);
    border-radius: 11px;
    background: rgba(255, 255, 255, .025);

  .dashboard-report-grid {
    grid-template-columns: repeat(7, minmax(0, 1fr));
  }

  .dashboard-list-item {
    transition: transform .18s ease, border-color .18s ease, background .18s ease;
  }

  .dashboard-list-item:hover {

    border-color: rgba(31, 157, 58, .28);
    background: rgba(31, 157, 58, .035);
  }

  @media (max-width: 1180px) {

      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .dashboard-report-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
  }

  @media (max-width: 900px) {

      width: 100%;

  @media (max-width: 680px) {

      grid-template-columns: 1fr 1fr;
    }

      grid-template-columns: repeat(2, minmax(0, 1fr));

    .dashboard-stats-v2 {
      grid-template-columns: 1fr;
    }

      min-height: 125px;
