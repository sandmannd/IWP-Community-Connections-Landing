function filterCheckInList() {
  var query = String(val('checkInSearch') || '').toLowerCase().trim();
  var sort = String(val('checkInSort') || 'name');
  var registrations = ((CURRENT_CHECKIN_DATA && CURRENT_CHECKIN_DATA.registrations) || []).slice();
  if (query) {
    registrations = registrations.filter(function(r) {
      return [r.Name, r.Email, r.Phone].join(' ').toLowerCase().indexOf(query) !== -1;
    });
  }
  if (CURRENT_CHECKIN_FILTER === 'remaining') {
    registrations = registrations.filter(function(r) { return String(r.Status || '').toLowerCase() !== 'checked in'; });
  } else if (CURRENT_CHECKIN_FILTER === 'checked') {
    registrations = registrations.filter(function(r) { return String(r.Status || '').toLowerCase() === 'checked in'; });
  } else if (CURRENT_CHECKIN_FILTER === 'unpaid') {
    registrations = registrations.filter(function(r) { return String(r.PaymentStatus || '').toLowerCase() !== 'paid'; });
  } else if (CURRENT_CHECKIN_FILTER === 'groups') {
    registrations = registrations.filter(function(r) { return Number(r.AdultCount || 0) + Number(r.ChildCount || 0) > 1; });
  }
  registrations.sort(function(a,b) {
    var aChecked = String(a.Status || '').toLowerCase() === 'checked in';
    var bChecked = String(b.Status || '').toLowerCase() === 'checked in';
    var aPaid = String(a.PaymentStatus || '').toLowerCase() === 'paid';
    var bPaid = String(b.PaymentStatus || '').toLowerCase() === 'paid';
    if (sort === 'unchecked' && aChecked !== bChecked) return aChecked ? 1 : -1;
    if (sort === 'unpaid' && aPaid !== bPaid) return aPaid ? 1 : -1;
    return String(a.Name || '').localeCompare(String(b.Name || ''));
  });
  renderCheckInRows(registrations);
}

  if (!text) {
    showToast('Add a note before saving the log entry.');

  var entries = getEventDayLog(CURRENT_DETAIL_EVENT_ID);
  entries.unshift({ id: String(Date.now()), type: type, text: text, createdAt: new Date().toISOString() });
  try { localStorage.setItem(eventDayLogKey(CURRENT_DETAIL_EVENT_ID), JSON.stringify(entries.slice(0, 50))); } catch (ignore) {}
  var field = document.getElementById('eventDayLogText');

function downloadTextFile(filename, content, mimeType) {
  var blob = new Blob([content], { type: mimeType || 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  window.setTimeout(function() { URL.revokeObjectURL(url); }, 500);
}

  var lines = [
    event.Title || 'Community Connections Adventure',
    'EVENT DAY REPORT',
    '',
    'Date: ' + (formatDate(event.StartDate) || 'Not provided'),
    'Time: ' + (formatTime(event.StartTime) || 'Not provided'),
    'Location: ' + (event.LocationName || event.Address || 'Not provided'),

    'ATTENDANCE',
    'Registrations: ' + registrations.length,
    'Expected people: ' + people,
    'Checked in: ' + checked,
    'Remaining: ' + Math.max(0, registrations.length - checked),
    'Paid registrations: ' + paid,
    'Unpaid registrations: ' + Math.max(0, registrations.length - paid),
    '',
    'SAFETY CHECKLIST'
  ];
  safety.forEach(function(input) {
    lines.push((input.checked ? '[x] ' : '[ ] ') + ((input.parentNode && input.parentNode.textContent) || input.getAttribute('data-event-day-safety') || '').trim());
  });
  lines.push('', 'ORGANIZER NOTES', notes, '', 'EVENT LOG');

function slugify(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/&/g, 'and')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'adventure';
}

function getCountdownLabel(event) {
  if (!event || !event.StartDate) return 'Date TBD';

  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var start = new Date(String(event.StartDate) + 'T00:00:00');
  if (isNaN(start.getTime())) return 'Date TBD';

  var diff = Math.round((start.getTime() - today.getTime()) / 86400000);

  if (diff < 0) return 'Past';
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  return diff + ' days away';
}

function firstAvailableText() {
  for (var i = 0; i < arguments.length; i++) {
    if (arguments[i]) {
      var text = String(arguments[i]).trim();
      return text.length > 140 ? text.substring(0, 140) + '...' : text;
    }
  }
  return '';
}

function formatDate(value){
  if(!value) return '';
  var d=new Date(value);
  return isNaN(d)?String(value):d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function formatTime(value){
  if(!value) return '';
  if(String(value).indexOf('1899-12-30')===0){
    var t=String(value).split(' ')[1]||'00:00:00';
    var parts=t.split(':');
    var h=parseInt(parts[0],10),m=parts[1]||'00';
    var ampm=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ampm;
  }
  var d=new Date(value);
  return isNaN(d)?String(value):d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function formatDateRange(event){
 var d1=formatDate(event.StartDate), d2=formatDate(event.EndDate);
 var t1=formatTime(event.StartTime), t2=formatTime(event.EndTime);
 var date=d2&&d2!==d1?d1+' to '+d2:d1;
 var time=t1?(t2?t1+' - '+t2:t1):'Time TBD';
 return date + (time ? ' · ' + time : '');
}

function formatDateRangeHtml(event){
 var d1=formatDate(event.StartDate), d2=formatDate(event.EndDate);
 var t1=formatTime(event.StartTime), t2=formatTime(event.EndTime);
 var date=d2&&d2!==d1?d1+' to '+d2:d1;
 var time=t1?(t2?t1+' - '+t2:t1):'Time TBD';
 return escapeHtml(date) + '<br><span class="event-time">' + escapeHtml(time) + '</span>';
}

function val(id) {
  var el = document.getElementById(id);

}

function chk(id) {
  var el = document.getElementById(id);
  return el ? el.checked : false;
}

function setVal(id, value) {
  var el = document.getElementById(id);
  if (el) el.value = value || '';
}

function setChk(id, value) {

function toggleElement(id, show) {

function toBool(value) {
  return value === true || value === 'true' || value === 'TRUE' || value === 1 || value === '1';
}

function escapeHtml(value) {
  return String(value || '').replace(/[&<>\"]/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
  });
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/'/g, '&#39;');
}

function escapeJs(value) {
  return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function getErrorMessage(error) {
  if (!error) return 'Unknown error';
  if (typeof error.message === 'string' && error.message.trim()) return error.message;
  if (typeof error.toString === 'function') return error.toString();
  return String(error);
}

function showError(error) {
  var message = getErrorMessage(error);
  console.error(error);
  showAppMessage('Something Went Wrong', message || 'The request could not be completed.');
}

var CURRENT_TIMELINE_EVENT_ID = '';
var CURRENT_TIMELINE_EVENT_TITLE = '';

function openEventTimeline(eventId, eventTitle) {
  CURRENT_TIMELINE_EVENT_ID = eventId;
  CURRENT_TIMELINE_EVENT_TITLE = eventTitle || 'Adventure';
  ensureEventTimelineModal();
  var modal = document.getElementById('eventTimelineModal');
  if (modal) modal.classList.remove('hidden');
  loadEventTimeline();
}

function ensureEventTimelineModal() {
  if (document.getElementById('eventTimelineModal')) return;
  var wrapper = document.createElement('div');
  wrapper.id = 'eventTimelineModal';
  wrapper.className = 'modal-backdrop hidden';
  wrapper.innerHTML =
    '<div class="modal-panel event-timeline-modal">' +
      '<div class="modal-header">' +
        '<div><span class="eyebrow">Organizer Timeline</span><h2 id="eventTimelineTitle">Event Tasks</h2></div>' +
        '<button class="secondary compact" type="button" onclick="closeEventTimeline()">Close</button>' +
      '</div>' +
      '<div class="timeline-add-row">' +
        '<input id="newTimelineTaskLabel" type="text" placeholder="Add your own task">' +
        '<input id="newTimelineTaskDate" type="date">' +
        '<button class="primary" type="button" onclick="addTimelineTask()">+ Add Task</button>' +
      '</div>' +
      '<div id="eventTimelineSummary" class="timeline-summary"></div>' +
      '<div id="eventTimelineList" class="timeline-list"><div class="notice">Loading timeline...</div></div>' +
    '</div>';
  wrapper.addEventListener('click', function(event) {
    if (event.target === wrapper) closeEventTimeline();
  });
  document.body.appendChild(wrapper);
}

function closeEventTimeline() {
  var modal = document.getElementById('eventTimelineModal');
  if (modal) modal.classList.add('hidden');
}

function loadEventTimeline() {
  var title = document.getElementById('eventTimelineTitle');
  var list = document.getElementById('eventTimelineList');
  if (title) title.textContent = CURRENT_TIMELINE_EVENT_TITLE;
  if (list) list.innerHTML = '<div class="notice">Loading timeline...</div>';
  google.script.run
    .withSuccessHandler(renderEventTimeline)
    .withFailureHandler(function(error) {
      if (list) list.innerHTML = '<div class="notice">' + escapeHtml(getErrorMessage(error)) + '</div>';
    })
    .listEventTasks(CURRENT_TIMELINE_EVENT_ID);
}

function renderEventTimeline(tasks) {
  tasks = tasks || [];
  var list = document.getElementById('eventTimelineList');
  var summary = document.getElementById('eventTimelineSummary');
  if (!list) return;

  var completed = tasks.filter(function(task) { return String(task.Status) === 'Complete'; }).length;
  var overdue = tasks.filter(function(task) {
    return task.DueDate && String(task.Status) !== 'Complete' && task.DueDate < localDateKey(new Date());
  }).length;
  if (summary) {
    summary.innerHTML =
      '<div><strong>' + tasks.length + '</strong><span>Total Tasks</span></div>' +
      '<div><strong>' + completed + '</strong><span>Complete</span></div>' +
      '<div><strong>' + overdue + '</strong><span>Overdue</span></div>';
  }

  if (!tasks.length) {
    list.innerHTML = '<div class="notice">No tasks have been added.</div>';
    return;
  }

  list.innerHTML = tasks.map(function(task) {
    var status = String(task.Status || 'Pending');
    var isComplete = status === 'Complete';
    var isOverdue = task.DueDate && !isComplete && task.DueDate < localDateKey(new Date());
    return '<article class="timeline-task' + (isComplete ? ' is-complete' : '') + (isOverdue ? ' is-overdue' : '') + '">' +
      '<button class="timeline-check" type="button" title="Toggle complete" onclick="toggleTimelineTask(\'' + escapeJs(task.TaskId) + '\', \'' + escapeJs(status) + '\')">' + (isComplete ? '✓' : '') + '</button>' +
      '<div class="timeline-task-copy">' +
        '<strong>' + escapeHtml(task.TaskLabel || 'Task') + '</strong>' +
        '<span>' + escapeHtml(task.DueDate ? formatTimelineDate(task.DueDate) : 'No due date') + (isOverdue ? ' • Overdue' : '') + '</span>' +
      '</div>' +
      '<select class="timeline-status-select" onchange="setTimelineTaskStatus(\'' + escapeJs(task.TaskId) + '\', this.value)">' +
        timelineStatusOption('Pending', status) + timelineStatusOption('In Progress', status) + timelineStatusOption('Complete', status) +
      '</select>' +
      '<button class="secondary compact" type="button" onclick="editTimelineTaskNotes(\'' + escapeJs(task.TaskId) + '\', \'' + escapeJs(task.Notes || '') + '\')">Notes</button>' +
      '<button class="danger-button compact" type="button" onclick="removeTimelineTask(\'' + escapeJs(task.TaskId) + '\')">Delete</button>' +
    '</article>';
  }).join('');
}

function timelineStatusOption(value, current) {
  return '<option value="' + value + '"' + (value === current ? ' selected' : '') + '>' + value + '</option>';
}

function localDateKey(date) {
  var year = date.getFullYear();
  var month = String(date.getMonth() + 1).padStart(2, '0');
  var day = String(date.getDate()).padStart(2, '0');
  return year + '-' + month + '-' + day;
}

function formatTimelineDate(value) {
  var parts = String(value || '').split('-');
  if (parts.length !== 3) return String(value || '');
  var date = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
  return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function toggleTimelineTask(taskId, currentStatus) {
  setTimelineTaskStatus(taskId, currentStatus === 'Complete' ? 'Pending' : 'Complete');
}

function setTimelineTaskStatus(taskId, status) {
  google.script.run
    .withSuccessHandler(loadEventTimeline)
    .withFailureHandler(showError)
    .updateEventTask(taskId, { Status: status });
}

function editTimelineTaskNotes(taskId, currentNotes) {
  var notes = window.prompt('Task notes:', currentNotes || '');
  if (notes === null) return;
  google.script.run

    .withFailureHandler(showError)

}

function addTimelineTask() {
  var label = val('newTimelineTaskLabel');
  var dueDate = val('newTimelineTaskDate');
  if (!String(label || '').trim()) {
    showAppMessage('Task Name Required', 'Enter a name for the organizer task.');

  google.script.run
    .withSuccessHandler(function() {
      setVal('newTimelineTaskLabel', '');
      setVal('newTimelineTaskDate', '');
      loadEventTimeline();
    })
    .withFailureHandler(showError)
    .addEventTask(CURRENT_TIMELINE_EVENT_ID, label, dueDate);
}

function removeTimelineTask(taskId) {
  if (!window.confirm('Delete this task?')) return;
  google.script.run
    .withSuccessHandler(loadEventTimeline)
    .withFailureHandler(showError)
    .deleteEventTask(taskId);
}

function copyEventCheckInLink() {
  var input = document.getElementById('eventCheckInQrLink');
  if (!input) return;
  input.select();
  input.setSelectionRange(0, input.value.length);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(input.value).then(function() {
      showToastMessage('Check-in link copied.');
    }).catch(function() {
      document.execCommand('copy');
      showToastMessage('Check-in link copied.');
    });
  } else {
    document.execCommand('copy');
    showToastMessage('Check-in link copied.');
  }
}

function showAppMessage(title, message, options) {
  options = options || {};
  var modal = ensureAppMessageModal();
  document.getElementById('appMessageTitle').textContent = title || 'Message';
  var messageBody = document.getElementById('appMessageBody');
  if (options.html) messageBody.innerHTML = message || '';
  else messageBody.textContent = message || '';

  var actions = document.getElementById('appMessageActions');
  actions.innerHTML = '';

  if (options.confirmText && typeof options.onConfirm === 'function') {
    var cancelButton = document.createElement('button');
    cancelButton.type = 'button';
    cancelButton.className = 'secondary';
    cancelButton.textContent = options.cancelText || 'Cancel';
    cancelButton.onclick = closeAppMessageModal;
    actions.appendChild(cancelButton);

    var confirmButton = document.createElement('button');
    confirmButton.type = 'button';
    confirmButton.className = options.danger ? 'danger-button' : 'primary';
    confirmButton.textContent = options.confirmText;
    confirmButton.onclick = function() {
      closeAppMessageModal();
      options.onConfirm();
    };
    actions.appendChild(confirmButton);
  } else {
    var okButton = document.createElement('button');
    okButton.type = 'button';
    okButton.className = 'primary';
    okButton.textContent = options.okText || 'OK';
    okButton.onclick = closeAppMessageModal;
    actions.appendChild(okButton);
  }

  modal.classList.remove('hidden');
}

function toggleEmailAutomation() {
  var button = document.getElementById('emailAutomationButton');
  if (!button) return;

  var enabled = button.dataset.enabled === 'true';
  var promptText = enabled
    ? 'Turn off automatic reminder and thank-you emails?'
    : 'Turn on automatic 24-hour reminder and next-day thank-you emails?';

  showAppMessage(
    enabled ? 'Turn Off Auto Emails?' : 'Turn On Auto Emails?',
    promptText,
    {
      confirmText: enabled ? 'Turn Off' : 'Turn On',
      cancelText: 'Cancel',
      danger: enabled,
      onConfirm: function() {
        button.disabled = true;
        button.textContent = enabled ? 'Turning Off...' : 'Turning On...';

        var runner = google.script.run
          .withSuccessHandler(function(status) {
            button.disabled = false;
            renderEmailAutomationStatus(status);
            showAppMessage(
              'Automatic Emails Updated',
              'Automatic reminder and thank-you emails are now ' + (status && status.enabled ? 'ON.' : 'OFF.')
            );
          })
          .withFailureHandler(function(error) {
            button.disabled = false;
            renderEmailAutomationStatus({ enabled: enabled });
            showAppMessage('Automatic Emails Error', getErrorMessage(error));
          });

        if (enabled) runner.disableEmailAutomation();
        else runner.enableEmailAutomation();
      }
    }
  );
}

// Launch polish: consistent modal behavior and safer mobile use.
(function initializeLaunchUiPolish() {
  if (window.__IWP_LAUNCH_UI_POLISH__) return;
  window.__IWP_LAUNCH_UI_POLISH__ = true;

  function getVisibleDialog() {
    var overlays = Array.prototype.slice.call(document.querySelectorAll('.modal-backdrop, .qr-modal-overlay'));
    for (var i = overlays.length - 1; i >= 0; i--) {
      var overlay = overlays[i];
      if (!overlay.classList.contains('hidden') && window.getComputedStyle(overlay).display !== 'none') return overlay;
    }
    return null;
  }

  function closeVisibleDialog() {
    var overlay = getVisibleDialog();
    if (!overlay) return false;
    if (overlay.id === 'registrationListModal' && typeof closeRegistrationList === 'function') closeRegistrationList();
    else if (overlay.id === 'eventEmailModal' && typeof closeEventEmailComposer === 'function') closeEventEmailComposer();
    else if (overlay.id === 'eventTimelineModal' && typeof closeEventTimeline === 'function') closeEventTimeline();
    else if (overlay.id === 'eventCheckInQrOverlay' && typeof closeEventCheckInQr === 'function') closeEventCheckInQr();
    else overlay.classList.add('hidden');
    document.body.classList.remove('modal-open');
    return true;
  }

  document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') closeVisibleDialog();
  });

  document.addEventListener('click', function(event) {
    var target = event.target;
    if (!target) return;
    if (target.classList && (target.classList.contains('modal-backdrop') || target.classList.contains('qr-modal-overlay'))) {
      closeVisibleDialog();
    }
  });

  var observer = new MutationObserver(function() {
    document.body.classList.toggle('modal-open', !!getVisibleDialog());
  });
  observer.observe(document.documentElement, { subtree: true, attributes: true, attributeFilter: ['class'], childList: true });
})();

function renderEmailQueueList(containerId, items, failedList) {

      ? escapeHtml(item.lastError || 'Send failed.')

      ? '<button class="secondary compact" type="button" onclick="retryQueuedEmail(\'' + escapeJs(item.queueId) + '\')">Retry</button>'

      '<div><strong>' + escapeHtml(item.eventTitle || 'Adventure') + '</strong>' +

function copyDeploymentUrl(inputId) {
  var input = document.getElementById(inputId);
  var value = input ? String(input.value || '').trim() : '';
  if (!value) {
    showAppMessage('Copy Link', 'There is no address to copy yet.');
    return;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(value)
      .then(function() { showToastMessage('Link copied.'); })
      .catch(function() { fallbackCopyDeploymentUrl(input); });
    return;
  }
  fallbackCopyDeploymentUrl(input);
}

function fallbackCopyDeploymentUrl(input) {
  if (!input) return;
  input.focus();
  input.select();
  try {
    document.execCommand('copy');
    showToastMessage('Link copied.');
  } catch (error) {
    showAppMessage('Copy Link', 'Select the address and copy it manually.');
  }
}

  list.innerHTML = admins.map(function(admin) {
    return '<div class="administration-list-row"><div><strong>' + escapeHtml(admin.name || admin.email) + '</strong>' +
      '<span>' + escapeHtml(admin.email) + ' • ' + escapeHtml(admin.role) + (admin.active ? '' : ' • Inactive') + '</span></div></div>';
  }).join('') || '<div class="dashboard-empty">No administrators found.</div>';
}

function showToast(message) {
  showToastMessage(message);
}

function showToastMessage(message) {
  var toast = document.getElementById('appToastMessage');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'appToastMessage';
    toast.className = 'app-toast-message';
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.classList.add('show');
  window.clearTimeout(window.__iwpToastTimer);
  window.__iwpToastTimer = window.setTimeout(function() { toast.classList.remove('show'); }, 2600);
}
</script>
