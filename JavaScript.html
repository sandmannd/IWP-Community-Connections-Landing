<script>
(function () {
  window.addEventListener('load', startApp);
})();

var LAST_REGISTRATION_LIST_DATA = null;
var CURRENT_DETAIL_EVENT_ID = '';
var CURRENT_CHECKIN_DATA = null;
var CURRENT_CHECKIN_FILTER = 'all';
var ALL_VISIBLE_EVENTS = [];
var REGISTRATION_MANAGER_FILTERS = { search: '', status: '', payment: '' };
var APP_ENTRY_MODE = ''; // public | organizer

function isPublicBrowsingMode() {
  if (APP_ENTRY_MODE === 'public') return true;
  return !CURRENT_USER || CURRENT_USER.isPublicPreview === true || CURRENT_USER.isPublicPreview === 'true' ||
    !(CURRENT_USER.isAdmin === true || CURRENT_USER.isAdmin === 'true');
}

function isOrganizerUser() {
  return Boolean(CURRENT_USER && (CURRENT_USER.isAdmin === true || CURRENT_USER.isAdmin === 'true'));
}


function startApp() {
  try {
    if (!window.CURRENT_USER) {
      window.CURRENT_USER = { isAdmin: false, role: 'Viewer', email: '' };
    }

    var createBtn = document.getElementById('createEventBtn');
    if (createBtn) {
      createBtn.onclick = showCreateEvent;
      if (CURRENT_USER && (CURRENT_USER.isAdmin === true || CURRENT_USER.isAdmin === 'true')) {
        createBtn.classList.remove('hidden');
      }
    }

    if (ROUTE && ROUTE.page === 'register' && ROUTE.eventId) {
      showRegistration(ROUTE.eventId);
    } else if (ROUTE && ROUTE.page === 'checkin' && ROUTE.eventId) {
      openCheckInMode(ROUTE.eventId);
    } else if (ROUTE && ROUTE.page === 'event' && ROUTE.eventId) {
      showEventDetail(ROUTE.eventId);
    } else {
      APP_ENTRY_MODE = 'public';
      document.body.classList.remove('entry-portal-active');
      showHome();
    }
  } catch (error) {
    showStartupError(error);
  }
}


function showEntryPortal() {
  setRegistrationRouteMode(false);
  APP_ENTRY_MODE = '';
  hideAllViews();
  hideLoading();

  var portal = document.getElementById('entryPortalView');
  if (portal) portal.classList.remove('hidden');

  var organizerChoice = document.getElementById('organizerPortalChoice');
  if (organizerChoice) organizerChoice.classList.toggle('hidden', !isOrganizerUser());

  var summary = document.getElementById('organizerPortalSummary');
  if (summary && isOrganizerUser()) {
    var name = String((CURRENT_USER && (CURRENT_USER.name || CURRENT_USER.displayName)) || 'Organizer').trim();
    summary.textContent = 'Welcome back' + (name ? ', ' + name.split(' ')[0] : '') + '. Manage adventures, registrations, messages, and Event Day tools.';
  }

  document.body.classList.add('entry-portal-active');
}

function enterPublicExperience() {
  APP_ENTRY_MODE = 'public';
  document.body.classList.remove('entry-portal-active');
  showHome();
}

function enterOrganizerExperience() {
  if (!isOrganizerUser()) {
    enterPublicExperience();
    return;
  }
  APP_ENTRY_MODE = 'organizer';
  document.body.classList.remove('entry-portal-active');
  showHome();
}

function returnToEntryPortal() {
  showEntryPortal();
}

function setRegistrationRouteMode(enabled) {
  if (!document.body) return;
  if (enabled) {
    document.body.classList.add('registration-route');
  } else {
    document.body.classList.remove('registration-route');
  }
}

function showStartupError(error) {
  var loading = document.getElementById('loading');
  if (loading) {
    loading.classList.remove('hidden');
    loading.innerHTML = 'Startup error: ' + getErrorMessage(error);
  }
}

function hideLoading() {
  var loading = document.getElementById('loading');
  if (loading) {
    loading.classList.add('hidden');
  }
}

function showHome() {
  setRegistrationRouteMode(false);
  hideAllViews();
  hideLoading();

  var home = document.getElementById('homeView');
  if (home) home.classList.remove('hidden');

  var cards = document.getElementById('eventCards');
  if (cards) {
    cards.innerHTML = buildAdventureSkeletons(6);
  }

  loadEvents();
}

function returnHome() {
  showHome();
}

function hideAllViews() {
  var ids = ['entryPortalView', 'homeView', 'createView', 'eventDetailView', 'registrationView', 'checkInView', 'administrationView'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (el) el.classList.add('hidden');
  }
}

function loadEvents() {
  google.script.run
    .withSuccessHandler(drawEventCards)
    .withFailureHandler(function (error) {
      var cards = document.getElementById('eventCards');
      if (cards) {
        cards.innerHTML = '<div class="empty-state"><h2>Could not load adventures</h2><p>' + escapeHtml(getErrorMessage(error)) + '</p></div>';
      }
    })
    .listEvents(isPublicBrowsingMode());
}

function drawEventCards(events) {
  hideLoading();

  var container = document.getElementById('eventCards');
  if (!container) return;

  container.innerHTML = '';

  events = events || [];

  var visibleEvents = [];
  var isAdmin = CURRENT_USER && (CURRENT_USER.isAdmin === true || CURRENT_USER.isAdmin === 'true');

  for (var i = 0; i < events.length; i++) {
    var status = String(events[i].Status || '').trim().toLowerCase();

    // Organizer mode can see every adventure. Public mode sees published adventures only.
    if ((!isPublicBrowsingMode() && isAdmin) || status === 'published') {
      visibleEvents.push(events[i]);
    }
  }

  ALL_VISIBLE_EVENTS = visibleEvents.slice();
  renderAdventureDiscovery(ALL_VISIBLE_EVENTS);
  populateAdventureTypeFilter(ALL_VISIBLE_EVENTS);
  loadActiveAdventureTypeFilterOptions();

  var statusWrap = document.getElementById('eventStatusFilterWrap');
  if (statusWrap) statusWrap.classList.toggle('hidden', !isAdmin);

  refreshCommandCenter();
  renderExperienceSwitcher();
  applyAdventureFilters();
}



function renderExperienceSwitcher() {
  var existing = document.getElementById('experienceSwitcher');
  if (existing) existing.remove();
  if (!isOrganizerUser()) return;

  var home = document.getElementById('homeView');
  if (!home) return;
  var switcher = document.createElement('div');
  switcher.id = 'experienceSwitcher';
  switcher.className = 'experience-switcher compact-mode-switcher';
  switcher.innerHTML = APP_ENTRY_MODE === 'organizer'
    ? '<span>Organizer View</span><button type="button" class="secondary compact" onclick="enterPublicExperience()">View Public Site</button>'
    : '<span>Public View</span><button type="button" class="primary compact" onclick="enterOrganizerExperience()">Organizer Portal</button>';
  home.insertBefore(switcher, home.firstChild);
}

function renderAdventureDiscovery(events) {
  events = events || [];
  renderAdventureStats(events);
  renderQuickCategoryChips(events);
  renderFeaturedAdventureSpotlight(events);
  renderPremiumAdventureRails(events);
  renderAdventureCollections(events);
}

function renderAdventureStats(events) {
  var container = document.getElementById('adventureStats');
  if (!container) return;
  var now = new Date();
  var month = now.getMonth();
  var year = now.getFullYear();
  var thisMonth = 0;
  var openSpots = 0;

  events.forEach(function(event) {
    var date = parseAdventureDate(event.StartDate || event.EventDate || event.Date);
    if (date && date.getMonth() === month && date.getFullYear() === year) thisMonth++;
    var capacity = Number(event.Capacity || event.MaxParticipants || 0);
    var registered = Number(event.TotalPeople || event.RegisteredCount || event.SpotsTaken || 0);
    if (capacity > 0) openSpots += Math.max(0, capacity - registered);
  });

  container.innerHTML =
    '<div><strong>' + events.length + '</strong><span>Upcoming</span></div>' +
    '<div><strong>' + (openSpots || 'Open') + '</strong><span>Open Spots</span></div>' +
    '<div><strong>' + thisMonth + '</strong><span>This Month</span></div>';
}

function renderQuickCategoryChips(events) {
  var container = document.getElementById('quickCategoryChips');
  if (!container) return;
  var counts = {};
  events.forEach(function(event) {
    var type = String(event.EventType || 'Adventure').trim();
    if (!type) return;
    counts[type] = (counts[type] || 0) + 1;
  });
  var types = Object.keys(counts).sort(function(a,b) {
    return counts[b] - counts[a] || a.localeCompare(b);
  }).slice(0, 8);
  if (!types.length) {
    container.innerHTML = '<span class="quick-category-empty">New adventure categories will appear here.</span>';
    return;
  }
  container.innerHTML = '<button type="button" class="quick-category-chip is-active" onclick="applyQuickCategory(\'\', this)"><span class="quick-chip-icon">' + getUiIcon('community') + '</span><span>All</span><small>' + events.length + '</small></button>' +
    types.map(function(type) {
      return '<button type="button" class="quick-category-chip" onclick="applyQuickCategory(\'' + escapeJs(type.toLowerCase()) + '\', this)">' +
        '<span class="quick-chip-icon">' + getAdventureDetailIcon(type) + '</span><span>' + escapeHtml(type) + '</span><small>' + counts[type] + '</small></button>';
    }).join('');
}

function applyQuickCategory(type, button) {
  setVal('eventTypeFilter', type || '');
  var chips = document.querySelectorAll('.quick-category-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('is-active');
  if (button) button.classList.add('is-active');
  applyAdventureFilters();
  var heading = document.querySelector('.adventure-list-heading');
  if (heading && heading.scrollIntoView) heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderFeaturedAdventureSpotlight(events) {
  var container = document.getElementById('featuredAdventureSpotlight');
  if (!container) return;
  var featured = null;
  for (var i = 0; i < events.length; i++) {
    if (toBool(events[i].Featured)) { featured = events[i]; break; }
  }
  if (!featured && events.length) featured = events[0];
  if (!featured) {
    container.classList.add('hidden');
    container.innerHTML = '';
    return;
  }
  var imageStyle = featured.ImageUrl
    ? ' style="background-image:linear-gradient(90deg,rgba(5,15,29,.96) 0%,rgba(5,15,29,.82) 48%,rgba(5,15,29,.18) 100%),url(' + escapeAttr(featured.ImageUrl) + ')"'
    : '';
  container.classList.remove('hidden');
  container.innerHTML =
    '<div class="featured-spotlight-media"' + imageStyle + '>' +
      '<div class="featured-spotlight-content">' +
        '<span class="featured-spotlight-label">' + getDashboardIcon('featured') + ' Featured Adventure</span>' +
        '<span class="eyebrow">' + escapeHtml(featured.EventType || 'Community Adventure') + '</span>' +
        '<h2>' + escapeHtml(featured.Title || 'Upcoming Adventure') + '</h2>' +
        '<p>' + escapeHtml(firstAvailableText(featured.Description, featured.WhatToExpect, 'Come connect with the community and make a new memory.')) + '</p>' +
        '<div class="featured-spotlight-facts">' +
          '<span>' + getMetaIcon('calendar') + escapeHtml(formatDateRange(featured) || 'Date coming soon') + '</span>' +
          '<span>' + getMetaIcon('location') + escapeHtml(featured.LocationName || 'Location coming soon') + '</span>' +
          '<span>' + getMetaIcon('cost') + escapeHtml(getCostLabel(featured) || 'See details') + '</span>' +
        '</div>' +
        '<div class="featured-spotlight-actions">' +
          (toBool(featured.RegistrationRequired) ? '<button type="button" class="primary" onclick="showRegistration(\'' + escapeJs(featured.EventId) + '\')">Register Now</button>' : '') +
          '<button type="button" class="secondary" onclick="showEventDetail(\'' + escapeJs(featured.EventId) + '\')">Explore Adventure</button>' +
        '</div>' +
      '</div>' +
      (!featured.ImageUrl ? '<div class="featured-spotlight-fallback featured-text-fallback"><span>COMMUNITY</span><strong>CONNECTIONS</strong></div>' : '') +
    '</div>';
}


function renderAdventureCollections(events) {
  events = (events || []).slice();
  var now = new Date();
  var inSevenDays = new Date(now.getTime() + (7 * 24 * 60 * 60 * 1000));

  var thisWeek = events.filter(function(event) {
    var date = parseAdventureDate(event.StartDate || event.EventDate || event.Date);
    return date && date >= now && date <= inSevenDays;
  });
  var family = events.filter(function(event) {
    return toBool(event.ChildrenAllowed) || /family|kids|children/i.test([event.EventType,event.Title,event.Description].join(' '));
  });
  var free = events.filter(function(event) {
    var cost = String(event.Cost || event.AdultCost || event.Price || '').trim();
    return !toBool(event.PaidEvent) || !cost || Number(cost.replace(/[^0-9.]/g,'')) === 0 || /free/i.test(cost);
  });
  var weekend = events.filter(function(event) {
    var date = parseAdventureDate(event.StartDate || event.EventDate || event.Date);
    return date && (date.getDay() === 0 || date.getDay() === 6);
  });

  renderAdventureCollection('thisWeekCollection', thisWeek, 'No adventures are scheduled in the next seven days.');
  renderAdventureCollection('familyCollection', family, 'Family-friendly adventures will appear here.');
  renderAdventureCollection('freeCollection', free, 'No free adventures are listed right now.');
  renderAdventureCollection('weekendCollection', weekend, 'Weekend adventures will appear here.');
}

function renderAdventureCollection(containerId, events, emptyMessage) {
  var container = document.getElementById(containerId);
  if (!container) return;
  var sorted = (events || []).slice().sort(function(a,b) {
    var ad = parseAdventureDate(a.StartDate || a.EventDate || a.Date);
    var bd = parseAdventureDate(b.StartDate || b.EventDate || b.Date);
    return (ad ? ad.getTime() : Number.MAX_SAFE_INTEGER) - (bd ? bd.getTime() : Number.MAX_SAFE_INTEGER);
  }).slice(0, 3);
  if (!sorted.length) {
    container.innerHTML = '<div class="collection-empty">' + escapeHtml(emptyMessage) + '</div>';
    return;
  }
  container.innerHTML = sorted.map(function(event) {
    var capacity = Number(event.Capacity || event.MaxParticipants || 0);
    var registered = Number(event.TotalPeople || event.RegisteredCount || event.SpotsTaken || 0);
    var remaining = capacity > 0 ? Math.max(0, capacity - registered) + ' spots left' : 'Open registration';
    return '<button type="button" class="collection-event" onclick="showEventDetail(\'' + escapeJs(event.EventId) + '\')">' +
      '<span class="collection-event-icon">' + getAdventureDetailIcon(event.EventType) + '</span>' +
      '<span><strong>' + escapeHtml(event.Title || 'Community Adventure') + '</strong><small>' + escapeHtml(formatDateRange(event) || 'Date coming soon') + ' · ' + escapeHtml(remaining) + '</small></span>' +
      '<span class="collection-event-arrow">→</span>' +
    '</button>';
  }).join('');
}

function renderPremiumAdventureRails(events) {
  events = (events || []).slice();
  var now = new Date();
  var weekAgo = new Date(now.getTime() - (7 * 24 * 60 * 60 * 1000));

  var newEvents = events.filter(function(event) {
    var created = parseAdventureDate(event.CreatedAt || event.CreatedDate || event.Timestamp);
    return created && created >= weekAgo;
  }).slice(0, 4);
  if (!newEvents.length) newEvents = events.slice(0, 3);

  var almostFull = events.filter(function(event) {
    var capacity = Number(event.Capacity || event.MaxParticipants || 0);
    var registered = Number(event.TotalPeople || event.RegisteredCount || event.SpotsTaken || 0);
    if (!capacity || registered >= capacity) return false;
    return (registered / capacity) >= 0.65;
  }).sort(function(a, b) {
    var aCap = Number(a.Capacity || a.MaxParticipants || 0);
    var bCap = Number(b.Capacity || b.MaxParticipants || 0);
    var aReg = Number(a.TotalPeople || a.RegisteredCount || a.SpotsTaken || 0);
    var bReg = Number(b.TotalPeople || b.RegisteredCount || b.SpotsTaken || 0);
    return (bReg / bCap) - (aReg / aCap);
  }).slice(0, 4);

  renderPremiumMiniList('newThisWeekAdventures', newEvents, 'New adventures will appear here as members add them.');
  renderPremiumMiniList('almostFullAdventures', almostFull, 'Nothing is close to full right now. There is still room to join in.');
  renderUpcomingAdventureTimeline(events);
}

function renderPremiumMiniList(containerId, events, emptyMessage) {
  var container = document.getElementById(containerId);
  if (!container) return;
  if (!events.length) {
    container.innerHTML = '<div class="premium-mini-empty">' + escapeHtml(emptyMessage) + '</div>';
    return;
  }
  container.innerHTML = events.map(function(event) {
    var capacity = Number(event.Capacity || event.MaxParticipants || 0);
    var registered = Number(event.TotalPeople || event.RegisteredCount || event.SpotsTaken || 0);
    var remaining = capacity > 0 ? Math.max(0, capacity - registered) : null;
    return '<button type="button" class="premium-mini-event" onclick="showEventDetail(\'' + escapeJs(event.EventId) + '\')">' +
      '<span class="premium-mini-icon">' + getAdventureDetailIcon(event.EventType) + '</span>' +
      '<span class="premium-mini-copy"><strong>' + escapeHtml(event.Title || 'Community Adventure') + '</strong><small>' + escapeHtml(formatDateRange(event) || 'Date coming soon') + '</small></span>' +
      '<span class="premium-mini-meta">' + (remaining === null ? 'Open' : remaining + ' left') + '</span>' +
    '</button>';
  }).join('');
}

function renderUpcomingAdventureTimeline(events) {
  var container = document.getElementById('upcomingAdventureTimeline');
  if (!container) return;
  var sorted = (events || []).slice().sort(function(a, b) {
    var ad = parseAdventureDate(a.StartDate || a.EventDate || a.Date);
    var bd = parseAdventureDate(b.StartDate || b.EventDate || b.Date);
    return (ad ? ad.getTime() : Number.MAX_SAFE_INTEGER) - (bd ? bd.getTime() : Number.MAX_SAFE_INTEGER);
  }).slice(0, 6);
  if (!sorted.length) {
    container.innerHTML = '<div class="premium-mini-empty">Upcoming adventures will appear here.</div>';
    return;
  }
  container.innerHTML = sorted.map(function(event, index) {
    var date = parseAdventureDate(event.StartDate || event.EventDate || event.Date);
    var month = date ? date.toLocaleDateString('en-US', { month: 'short' }) : 'TBD';
    var day = date ? date.getDate() : '—';
    return '<button type="button" class="timeline-adventure" onclick="showEventDetail(\'' + escapeJs(event.EventId) + '\')">' +
      '<span class="timeline-marker"><small>' + escapeHtml(month) + '</small><strong>' + escapeHtml(String(day)) + '</strong></span>' +
      '<span class="timeline-line' + (index === sorted.length - 1 ? ' is-last' : '') + '"></span>' +
      '<span class="timeline-copy"><small>' + escapeHtml(event.EventType || 'Adventure') + '</small><strong>' + escapeHtml(event.Title || 'Community Adventure') + '</strong><span>' + escapeHtml(event.LocationName || 'Location coming soon') + '</span></span>' +
      '<span class="timeline-arrow" aria-hidden="true">→</span>' +
    '</button>';
  }).join('');
}

function parseAdventureDate(value) {
  if (!value) return null;
  var date = value instanceof Date ? value : new Date(value);
  return isNaN(date.getTime()) ? null : date;
}

function loadActiveAdventureTypeFilterOptions() {
  if (!window.google || !google.script || !google.script.run) return;
  google.script.run
    .withSuccessHandler(function(activeTypes) {
      populateAdventureTypeFilter(ALL_VISIBLE_EVENTS, activeTypes || []);
    })
    .withFailureHandler(function() {
      // Event-derived options remain available when the category sheet cannot load.
    })
    .getActiveEventTypes();
}

function populateAdventureTypeFilter(events, activeTypes) {
  var select = document.getElementById('eventTypeFilter');
  if (!select) return;
  var current = select.value;
  var seen = {};
  var types = [];
  (activeTypes || []).forEach(function(typeName) {
    var type = String(typeName || '').trim();
    if (!type || seen[type.toLowerCase()]) return;
    seen[type.toLowerCase()] = true;
    types.push(type);
  });
  (events || []).forEach(function(event) {
    var type = String(event.EventType || '').trim();
    if (!type || seen[type.toLowerCase()]) return;
    seen[type.toLowerCase()] = true;
    types.push(type);
  });
  types.sort(function(a, b) { return a.localeCompare(b); });
  select.innerHTML = '<option value="">All types</option>' + types.map(function(type) {
    return '<option value="' + escapeAttr(type.toLowerCase()) + '">' + escapeHtml(type) + '</option>';
  }).join('');
  if (types.some(function(type) { return type.toLowerCase() === current; })) select.value = current;
}

function applyAdventureFilters() {
  var container = document.getElementById('eventCards');
  if (!container) return;

  var search = String(val('eventSearchInput') || '').trim().toLowerCase();
  var type = String(val('eventTypeFilter') || '').trim().toLowerCase();
  var status = String(val('eventStatusFilter') || '').trim().toLowerCase();
  var filtered = (ALL_VISIBLE_EVENTS || []).filter(function(event) {
    var eventType = String(event.EventType || '').trim().toLowerCase();
    var eventStatus = String(event.Status || '').trim().toLowerCase();
    var haystack = [event.Title, event.LocationName, event.Address, event.Description, event.WhatToExpect, event.EventType]
      .map(function(value) { return String(value || '').toLowerCase(); })
      .join(' ');
    return (!search || haystack.indexOf(search) !== -1) &&
      (!type || eventType === type) &&
      (!status || eventStatus === status);
  });

  container.innerHTML = '';
  if (!filtered.length) {
    container.innerHTML = buildEmptyState('search', 'No Matching Adventures', 'Try changing or clearing the search filters.', true);
  } else {
    filtered.forEach(function(event) { container.appendChild(buildAdventureCard(event)); });
  }

  var count = document.getElementById('eventFilterCount');
  if (count) count.textContent = filtered.length + ' of ' + (ALL_VISIBLE_EVENTS || []).length + ' adventure' + ((ALL_VISIBLE_EVENTS || []).length === 1 ? '' : 's');
  var clear = document.getElementById('clearEventFiltersBtn');
  if (clear) clear.classList.toggle('hidden', !(search || type || status));
  syncQuickCategoryChips(type);
}

function syncQuickCategoryChips(type) {
  var chips = document.querySelectorAll('.quick-category-chip');
  for (var i = 0; i < chips.length; i++) {
    var handler = chips[i].getAttribute('onclick') || '';
    var matches = type ? handler.indexOf("'" + type + "'") !== -1 : handler.indexOf("'',") !== -1;
    chips[i].classList.toggle('is-active', matches);
  }
}

function clearAdventureFilters() {
  setVal('eventSearchInput', '');
  setVal('eventTypeFilter', '');
  setVal('eventStatusFilter', '');
  applyAdventureFilters();
}

function buildAdventureCard(event) {
  var card = document.createElement('div');
  var typeSlug = slugify(event.EventType || 'adventure');
  card.className = 'card adventure-card adventure-type-' + typeSlug + (toBool(event.Featured) ? ' is-featured' : '');

  var status = String(event.Status || '').trim();
  var statusSlug = slugify(status || 'draft');
  var isPublished = status.toLowerCase() === 'published';
  var isAdmin = CURRENT_USER && (CURRENT_USER.isAdmin === true || CURRENT_USER.isAdmin === 'true');
  var canRegisterFromCard = isPublished && toBool(event.RegistrationRequired);

  var primaryActions = '';
  if (canRegisterFromCard) {
    primaryActions += '<button class="primary" type="button" onclick="showRegistration(\'' + escapeJs(event.EventId) + '\')">Register</button>';
  }
  primaryActions += '<button class="secondary" type="button" onclick="showEventDetail(\'' + escapeJs(event.EventId) + '\')">View Details</button>';

  var adminActions = '';
  if (isAdmin) {
    if (status.toLowerCase() === 'draft') {
      adminActions += '<button class="primary" type="button" onclick="publishEventFromCard(\'' + escapeJs(event.EventId) + '\')">Publish</button>';
    }
    adminActions += '<button class="secondary" type="button" onclick="viewRegistrations(\'' + escapeJs(event.EventId) + '\')">Registrations</button>';
    adminActions += '<button class="secondary" type="button" onclick="editEvent(\'' + escapeJs(event.EventId) + '\')">Edit</button>';
    adminActions += '<button class="danger" type="button" onclick="deleteEventFromCard(\'' + escapeJs(event.EventId) + '\')">Delete</button>';
  }

  var capacityHtml = buildCardCapacity(event);

  card.innerHTML =
    '<div class="adventure-image"' + (event.ImageUrl ? ' style="background-image:linear-gradient(180deg,rgba(2,6,23,.02),rgba(2,6,23,.78)),url(' + escapeAttr(event.ImageUrl) + ')"' : '') + '>' +
      '<div class="image-shade"></div>' +
      '<div class="adventure-image-icon">' + getAdventureDetailIcon(event.EventType) + '</div>' +
      '<div class="adventure-image-label">' + escapeHtml(event.EventType || 'Adventure') + '</div>' +
      '<div class="adventure-date-tile"><strong>' + escapeHtml(getCardDateDay(event)) + '</strong><span>' + escapeHtml(getCardDateMonth(event)) + '</span></div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="card-topline">' +
        '<span class="status-badge status-' + escapeAttr(statusSlug) + '">' + escapeHtml(status || 'Draft') + '</span>' +

function buildCardCapacity(event) {
  if (!toBool(event.RegistrationRequired)) return '';

  var people = Number(event.PeopleCount || 0);
  var max = Number(event.MaxParticipants || 0);
  var waitlist = Number(event.WaitlistCount || 0);
  var countLabel = people + ' registered';

  if (!max) {
    return '<div class="card-capacity card-capacity-open">' +
      '<div class="card-capacity-row"><span>Attendance</span><strong>' + escapeHtml(countLabel) + '</strong></div>' +
      (waitlist ? '<div class="card-waitlist">' + waitlist + ' on waitlist</div>' : '') +
    '</div>';
  }

  var percent = Math.max(0, Math.min(100, Math.round((people / max) * 100)));
  var remaining = Math.max(0, max - people);
  var statusText = remaining > 0 ? remaining + ' spot' + (remaining === 1 ? '' : 's') + ' left' : 'Full';

  return '<div class="card-capacity">' +
    '<div class="card-capacity-row"><span>' + people + ' of ' + max + ' registered</span><strong>' + statusText + '</strong></div>' +
    '<div class="capacity-track" aria-label="' + escapeAttr(percent + '% full') + '"><span style="width:' + percent + '%"></span></div>' +
    (waitlist ? '<div class="card-waitlist">' + waitlist + ' on waitlist</div>' : '') +
  '</div>';
}

function saveEventDraft() {
  var data = collectEventFormData();
  var eventId = val('eventId');

  if (!data.title) {
    showToastMessage('Adventure name is required.');
    return;
  }

  var rawStartDate = val('startDate');
  var rawEndDate = val('endDate');
  if (rawStartDate && !data.startDate) {
    markAdventureDateInvalid('startDate');
    showToastMessage('Enter a valid start date as MM/DD/YY.');
    return;
  }
  if (rawEndDate && !data.endDate) {
    markAdventureDateInvalid('endDate');
    showToastMessage('Enter a valid end date as MM/DD/YY.');
    return;
  }
  if (data.startDate && data.endDate && data.endDate < data.startDate) {
    markAdventureDateInvalid('endDate');
    showToastMessage('End date cannot be before the start date.');
    return;
  }

  var button = document.getElementById('saveDraftBtn');
  if (button) {
    button.disabled = true;
    button.textContent = 'Saving...';
  }

  uploadSelectedEventImageIfNeeded(function(imageUrl) {
    data.imageUrl = imageUrl || data.imageUrl || '';
    saveEventDraftRecord(eventId, data, button);
  }, function(error) {
    if (button) {
      button.disabled = false;
      button.textContent = 'Save Draft';
    }
    showError(error);
  });
}

function saveEventDraftRecord(eventId, data, button) {
  var runner = google.script.run
    .withSuccessHandler(function(response) {
      if (button) {
        button.disabled = false;
        button.textContent = 'Save Draft';
      }
      showToastMessage(response && response.message ? response.message : 'Adventure draft saved.');
      window.setTimeout(returnHome, 450);
    })
    .withFailureHandler(function(error) {
      if (button) {
        button.disabled = false;
        button.textContent = 'Save Draft';
      }
      showError(error);
    });

  if (eventId) runner.updateEventDraft(eventId, data);
  else runner.createEventDraft(data);
}

function uploadSelectedEventImageIfNeeded(success, failure) {
  var input = document.getElementById('eventImageFile');
  var existingUrl = val('eventImageUrl');

  if (!input || !input.files || !input.files.length) {
    success(existingUrl);
    return;
  }

  var file = input.files[0];
  if (file.size > 5 * 1024 * 1024) {
    failure(new Error('Image must be smaller than 5 MB.'));
    return;
  }

  var reader = new FileReader();
  reader.onload = function() {
    google.script.run
      .withSuccessHandler(function(response) {
        var imageUrl = response && response.imageUrl ? response.imageUrl : '';
        setVal('eventImageUrl', imageUrl);
        success(imageUrl);
      })
      .withFailureHandler(failure)
      .uploadEventImage({
        fileName: file.name,
        mimeType: file.type,
        base64: reader.result
      });
  };
  reader.onerror = function() {
    failure(new Error('The image could not be read.'));
  };
  reader.readAsDataURL(file);
}

function autoFormatAdventureDate(input) {
  if (!input) return;

  var digits = String(input.value || '').replace(/\D/g, '').slice(0, 8);

  if (digits.length <= 2) {
    input.value = digits;
  } else if (digits.length <= 4) {
    input.value = digits.slice(0, 2) + '/' + digits.slice(2);
  } else {
    input.value = digits.slice(0, 2) + '/' + digits.slice(2, 4) + '/' + digits.slice(4);
  }

  input.classList.remove('field-error');
  input.removeAttribute('aria-invalid');
  updateAdventureBuilderPreview();
}

function normalizeAdventureDateField(id) {
  var input = document.getElementById(id);
  if (!input) return;

  var normalized = normalizeAdventureDateValue(input.value);
  if (!normalized) {
    if (String(input.value || '').trim()) {
      input.classList.add('field-error');
      input.setAttribute('aria-invalid', 'true');
      showToastMessage('Enter a valid date as MM/DD/YY.');
    }
    updateAdventureBuilderPreview();
    return;
  }

  input.classList.remove('field-error');
  input.removeAttribute('aria-invalid');
  input.value = formatAdventureDateForInput(normalized);
  updateAdventureBuilderPreview();
}

function normalizeAdventureDateValue(value) {
  var text = String(value || '').trim();
  if (!text) return '';

  var iso = text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (iso) {
    return buildAdventureIsoDate(
      Number(iso[1]),
      Number(iso[2]),
      Number(iso[3])
    );
  }

  var compact = text.match(/^(\d{2})(\d{2})(\d{2}|\d{4})$/);
  if (compact) {
    text = compact[1] + '/' + compact[2] + '/' + compact[3];
  }

  var slash = text.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2}|\d{4})$/);
  if (!slash) return '';

  var year = Number(slash[3]);
  if (year < 100) year += 2000;

  return buildAdventureIsoDate(
    year,
    Number(slash[1]),
    Number(slash[2])
  );
}

function buildAdventureIsoDate(year, month, day) {
  var date = new Date(year, month - 1, day);

  if (
    date.getFullYear() !== year ||
    date.getMonth() !== month - 1 ||
    date.getDate() !== day
  ) {
    return '';
  }

  return String(year).padStart(4, '0') + '-' +
    String(month).padStart(2, '0') + '-' +
    String(day).padStart(2, '0');
}

function formatAdventureDateForInput(value) {
  var iso = normalizeAdventureDateValue(value);
  if (!iso) return String(value || '');

  var parts = iso.split('-');
  return Number(parts[1]) + '/' + Number(parts[2]) + '/' + parts[0].slice(-2);
}

function formatAdventurePreviewDate(value) {
  var iso = normalizeAdventureDateValue(value);
  if (!iso) return 'Enter date as MM/DD/YY';

  var parts = iso.split('-');
  var date = new Date(
    Number(parts[0]),
    Number(parts[1]) - 1,
    Number(parts[2])
  );

  return date.toLocaleDateString('en-US', {
    weekday: 'long',
    month: 'long',
    day: 'numeric',
    year: 'numeric'
  });
}

function openPublishChecklist(event) {
  event = event || {};
  var checklist = getPublishChecklist(event);
  var blockers = checklist.filter(function(item) {
    return item.required && !item.complete;
  });

  var rows = checklist.map(function(item) {
    return '<div class="publish-check-item ' +
      (item.complete ? 'is-complete' : item.required ? 'is-blocked' : 'is-warning') + '">' +
      '<span class="publish-check-icon">' + (item.complete ? '✓' : item.required ? '!' : '•') + '</span>' +
      '<div><strong>' + escapeHtml(item.label) + '</strong>' +
      '<small>' + escapeHtml(item.message) + '</small></div>' +
    '</div>';
  }).join('');

  var summary = blockers.length
    ? '<div class="publish-check-summary is-blocked"><strong>' + blockers.length +
      (blockers.length === 1 ? ' required item is missing.' : ' required items are missing.') +
      '</strong><span>Open the adventure, complete the missing information, and try publishing again.</span></div>'
    : '<div class="publish-check-summary is-ready"><strong>Adventure ready to publish.</strong>' +
      '<span>It will become visible to the public immediately.</span></div>';

  showAppMessage(
    blockers.length ? 'Adventure Needs Work' : 'Publish Adventure?',
    '<div class="publish-checklist">' + summary + rows + '</div>',
    blockers.length ? {
      html: true,
      okText: 'Back to Adventure'
    } : {
      html: true,
      confirmText: 'Publish Adventure',
      cancelText: 'Keep as Draft',
      onConfirm: function() {
        google.script.run
          .withSuccessHandler(function(response) {
            showToastMessage(response && response.message ? response.message : 'Adventure published.');
            showHome();
          })
          .withFailureHandler(showError)
          .publishEvent(event.EventId);
      }
    }
  );
}

function getPublishChecklist(event) {
  var registrationRequired = toBool(event.RegistrationRequired);
  var paid = toBool(event.PaidEvent) && !toBool(event.FreeEvent);
  var hasPaymentMethod =
    toBool(event.VenmoEnabled) ||
    toBool(event.CashAppEnabled) ||
    toBool(event.CashEnabled) ||
    toBool(event.PayAtEventEnabled) ||
    toBool(event.BuyOwnTicketsEnabled);

  return [
    {
      label: 'Adventure name',
      complete: Boolean(String(event.Title || '').trim()),
      required: true,
      message: event.Title ? event.Title : 'Add a clear adventure name.'
    },
    {

function showEventDetail(eventId) {
  CURRENT_DETAIL_EVENT_ID = eventId;
  hideAllViews();
  hideLoading();

  var view = document.getElementById('eventDetailView');
  if (view) view.classList.remove('hidden');

  var content = document.getElementById('eventDetailContent');
  if (content) content.innerHTML = '<div class="notice">Loading adventure details...</div>';

  google.script.run
    .withSuccessHandler(function(data) {
      drawEventDetail(data);
    })
    .withFailureHandler(function(error) {
      var message = getErrorMessage(error);
      if (content) {
        content.innerHTML = '<div class="notice"><strong>Could not load adventure details.</strong><br>' + escapeHtml(message) + '</div>';
      }
    })
    .getEventDetailData(eventId, isPublicBrowsingMode());
}

function drawEventDetail(data) {
  data = data || {};
  var event = data.event || {};
  window.CURRENT_DETAIL_EVENT = event;
  var registrations = data.registrations || [];
  var published = event.Status === 'Published';
  var canRegister = published && toBool(event.RegistrationRequired);
  var content = document.getElementById('eventDetailContent');
  var adminActions = document.getElementById('detailAdminActions');

  if (adminActions) {
    adminActions.innerHTML = CURRENT_USER.isAdmin
      ? '<button class="secondary" type="button" onclick="editEvent(\'' + escapeJs(event.EventId) + '\')">Edit Adventure</button>' +
        '<button class="secondary" type="button" onclick="viewRegistrations(\'' + escapeJs(event.EventId) + '\')">Registrations</button>' +
        '<button class="secondary" type="button" onclick="showEventCheckInQr(\'' + escapeJs(event.EventId) + '\', \'' + escapeJs(event.Title || 'Adventure') + '\')">QR Check-In</button>' +
        '<button class="primary" type="button" onclick="openCheckInMode(\'' + escapeJs(event.EventId) + '\')">Check In</button>'
      : '';
  }

  if (!content) return;

  var peopleCount = registrations.reduce(function(total, registration) {
    if (String(registration.Status || '').toLowerCase() === 'cancelled') return total;
    return total + Number(registration.AdultCount || 0) + Number(registration.ChildCount || 0);
  }, 0);

  var maxParticipants = Number(event.MaxParticipants || 0);
  var spotsRemaining = maxParticipants > 0 ? Math.max(0, maxParticipants - peopleCount) : null;
  var full = maxParticipants > 0 && spotsRemaining === 0;
  var waitlistAvailable = full && toBool(event.WaitlistEnabled);

  var primaryButton = '';
  if (canRegister) {
    primaryButton =
      '<button class="primary wide detail-register-button" type="button" onclick="showRegistration(\'' +
      escapeJs(event.EventId) + '\')">' +
      (waitlistAvailable ? 'Join Waitlist' : full ? 'Adventure Full' : 'Register Now') +
      '</button>';
  }

  var image = event.ImageUrl
    ? '<div class="adventure-detail-image"><img src="' + escapeAttr(event.ImageUrl) + '" alt=""></div>'
    : '<div class="adventure-detail-image adventure-detail-image-fallback"><span>' + getAdventureDetailIcon(event.EventType) + '</span></div>';

  var mapLink = event.Address
    ? '<a class="detail-map-link" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=' +
      encodeURIComponent(event.Address) + '">Open in Google Maps →</a>'
    : '';

  var capacityPercent = maxParticipants > 0
    ? Math.min(100, Math.round((peopleCount / maxParticipants) * 100))
    : 0;

  var capacityLabel = maxParticipants > 0
    ? peopleCount + ' of ' + maxParticipants + ' spots filled'
    : peopleCount + ' registered';

  var availabilityLabel = maxParticipants === 0
    ? 'Registration open'
    : spotsRemaining > 0
      ? spotsRemaining + (spotsRemaining === 1 ? ' spot remaining' : ' spots remaining')
      : waitlistAvailable ? 'Full · Waitlist available' : 'Full';

  content.innerHTML =
    '<section class="adventure-detail-hero">' +
      image +
      '<div class="adventure-detail-overlay"></div>' +
      '<div class="adventure-detail-hero-copy">' +
        '<div class="detail-badges">' +
          '<span class="badge">' + escapeHtml(event.Status || '') + '</span>' +
          '<span class="mini-badge">' + escapeHtml(event.EventType || 'Adventure') + '</span>' +
          (toBool(event.Featured) ? '<span class="mini-badge featured-badge">' + getDashboardIcon('featured') + '<span>Featured</span></span>' : '') +
          (toBool(event.ChildrenAllowed) ? '<span class="mini-badge badge-good">Families Welcome</span>' : '') +
        '</div>' +
        '<h2>' + escapeHtml(event.Title || 'Untitled Adventure') + '</h2>' +
        '<p>' + formatDateRangeHtml(event) + '</p>' +
      '</div>' +
    '</section>' +

    '<div class="adventure-detail-layout">' +
      '<main class="adventure-detail-main">' +
        '<section class="adventure-content-section">' +
          '<span class="eyebrow">About This Adventure</span>' +
          '<h3>Adventure Details</h3>' +
          '<div class="adventure-rich-copy">' + formatAdventureCopy(event.Description || 'No description has been added yet.') + '</div>' +
        '</section>' +

        '<div class="adventure-info-grid">' +
          buildAdventureInfoCard(getMetaIcon('expect'), 'What To Expect', event.WhatToExpect || 'Details coming soon.') +
          buildAdventureInfoCard(getMetaIcon('bring'), 'What To Bring', event.WhatToBring || 'Bring what you need to be comfortable.') +
          buildAdventureInfoCard(getMetaIcon('provided'), 'Provided', event.Provided || 'No provided items are listed.') +
          buildAdventureInfoCard(getMetaIcon('notes'), 'Special Notes', event.SpecialNotes || 'No special notes are listed.') +
        '</div>' +

        '<section class="member-organized-notice">' +
          '<strong>Member-Organized Activity</strong>' +
          '<p>Community Connections activities are member-organized and are not official IWP events. They are not facilitated, monitored, or organized by IWP staff.</p>' +
        '</section>' +
      '</main>' +

      '<aside class="adventure-detail-sidebar">' +
        '<section class="detail-booking-card">' +
          '<span class="eyebrow">Adventure Information</span>' +
          '<div class="detail-quick-list">' +
            buildQuickInfoRow(getMetaIcon('calendar'), 'Date', formatDateRange(event) || 'Date coming soon') +
            buildQuickInfoRow(getMetaIcon('time'), 'Time', formatTime(event.StartTime) || 'Time TBD') +
            buildQuickInfoRow(getMetaIcon('location'), 'Location', event.LocationName || 'Location coming soon') +
            buildQuickInfoRow(getMetaIcon('cost'), 'Cost', getCostLabel(event) || 'Not listed') +
            buildQuickInfoRow(getMetaIcon('people'), 'Participation', toBool(event.ChildrenAllowed) ? 'Families and children welcome' : 'Adults only') +
          '</div>' +

          (event.Address
            ? '<div class="detail-address"><strong>' + escapeHtml(event.Address) + '</strong>' + mapLink + '</div>'
            : '') +

          '<div class="capacity-block">' +
            '<div class="capacity-heading"><strong>' + escapeHtml(availabilityLabel) + '</strong><span>' + escapeHtml(capacityLabel) + '</span></div>' +
            (maxParticipants > 0
              ? '<div class="capacity-track"><span style="width:' + capacityPercent + '%"></span></div>'
              : '') +
          '</div>' +

          '<div class="actions vertical-actions">' + primaryButton + '</div>' +
          '<div class="adventure-detail-actions">' +
            (event.Address ? '<a class="button-link secondary" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(event.Address) + '">Directions</a>' : '') +
            '<button class="secondary" type="button" onclick="copyAdventureLink(\'' + escapeJs(event.EventId) + '\')">Share</button>' +
            '<button class="secondary" type="button" onclick="downloadAdventureCalendar(\'' + escapeJs(event.EventId) + '\')">Calendar</button>' +
          '</div>' +
          (event.OrganizerName ? '<div class="detail-organizer-card">' + buildOrganizerAvatar(event, 'detail-organizer-avatar') + '<div><small>Organized By</small><strong>' + escapeHtml(event.OrganizerName) + '</strong></div></div>' : '') +
        '</section>' +

        '<section class="detail-community-card">' +
          '<span class="detail-community-icon">' + getUiIcon('community') + '</span>' +
          '<strong>You Are Not Alone.</strong>' +
          '<p>Come as you are. Meet people who understand. Build connections that extend beyond the adventure.</p>' +
        '</section>' +
      '</aside>' +
    '</div>' +
    buildCommunityMemoriesSection(event, data.memories || []) +
    (CURRENT_USER.isAdmin ? buildOrganizerPanel(event, data) : '') +
    (canRegister ? '<div class="mobile-detail-cta"><div><small>' + escapeHtml(availabilityLabel) + '</small><strong>' + escapeHtml(getCostLabel(event) || 'See details') + '</strong></div>' + primaryButton + '</div>' : '');
}

function copyAdventureLink(eventId) {
  var base = (APP_CONFIG && APP_CONFIG.publicAppUrl) || window.location.href.split('?')[0];
  var link = base + '?event=' + encodeURIComponent(eventId);
  copyTextToClipboard(link, 'Adventure link copied.');
}

function downloadAdventureCalendar(eventId) {
  var event = window.CURRENT_DETAIL_EVENT || {};
  if (!event.EventId || String(event.EventId) !== String(eventId)) {
    showAppMessage('Calendar', 'Calendar download will be available after the adventure finishes loading.');
    return;
  }
  var start = String(event.StartDate || '').replace(/-/g, '') + 'T' + String(event.StartTime || '0900').replace(/:/g, '').slice(0,4) + '00';
  var end = String(event.EndDate || event.StartDate || '').replace(/-/g, '') + 'T' + String(event.EndTime || event.StartTime || '1000').replace(/:/g, '').slice(0,4) + '00';
  var lines = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT','DTSTART:' + start,'DTEND:' + end,'SUMMARY:' + String(event.Title || 'Community Connections Adventure').replace(/[,;]/g,' '),'LOCATION:' + String(event.Address || event.LocationName || '').replace(/[,;]/g,' '),'DESCRIPTION:' + String(event.Description || '').replace(/\r?\n/g,' ').replace(/[,;]/g,' '),'END:VEVENT','END:VCALENDAR'];
  var blob = new Blob([lines.join('\r\n')], {type:'text/calendar'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download='community-connections-adventure.ics'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function getInitials(name) {
  var parts = String(name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return 'CC';
  return (parts[0].charAt(0) + (parts.length > 1 ? parts[parts.length - 1].charAt(0) : '')).toUpperCase();
}

function buildOrganizerAvatar(event, className) {
  event = event || {};
  var photoUrl = event.OrganizerPhotoUrl || event.OrganizerImageUrl || '';
  var label = event.OrganizerName ? event.OrganizerName + ', organizer' : 'Adventure organizer';

  if (photoUrl) {
    return '<span class="' + escapeAttr(className) + ' has-photo"><img src="' + escapeAttr(photoUrl) + '" alt="' + escapeAttr(label) + '"></span>';
  }

  return '<span class="' + escapeAttr(className) + '">' + escapeHtml(getInitials(event.OrganizerName)) + '</span>';
}

function getAdventureDetailIcon(type) {
  var value = String(type || '').toLowerCase();
  if (value.indexOf('fish') !== -1) return getUiIcon('fishing');
  if (value.indexOf('camp') !== -1 || value.indexOf('bonfire') !== -1) return getUiIcon('camping');
  if (value.indexOf('kayak') !== -1 || value.indexOf('tub') !== -1 || value.indexOf('water') !== -1) return getUiIcon('water');
  if (value.indexOf('hunt') !== -1) return getUiIcon('hunting');
  if (value.indexOf('bowling') !== -1) return getUiIcon('bowling');
  if (value.indexOf('concert') !== -1 || value.indexOf('music') !== -1) return getUiIcon('music');
  if (value.indexOf('hiking') !== -1 || value.indexOf('walk') !== -1) return getUiIcon('hiking');
  if (value.indexOf('poker') !== -1 || value.indexOf('card') !== -1 || value.indexOf('cribbage') !== -1) return getUiIcon('cards');
  if (value.indexOf('sport') !== -1 || value.indexOf('game') !== -1) return getUiIcon('sports');
  if (value.indexOf('utv') !== -1 || value.indexOf('atv') !== -1) return getUiIcon('vehicle');
  return getUiIcon('community');
}

function formatAdventureCopy(value) {

var CURRENT_MEMORY_EVENT_ID = '';
var CURRENT_MEMORY_EVENT_TITLE = '';

function openMemoryManager(eventId, eventTitle) {
  CURRENT_MEMORY_EVENT_ID = eventId;
  CURRENT_MEMORY_EVENT_TITLE = eventTitle || 'Adventure';
  ensureMemoryManager();
  var modal = document.getElementById('memoryManagerModal');
  if (modal) modal.classList.remove('hidden');
  loadMemoryManager();
}

function ensureMemoryManager() {
  if (document.getElementById('memoryManagerModal')) return;

  var wrapper = document.createElement('div');
  wrapper.id = 'memoryManagerModal';
  wrapper.className = 'modal-backdrop hidden';
  wrapper.innerHTML =
    '<div class="modal-panel memory-manager-modal">' +
      '<div class="modal-header">' +
        '<div><span class="eyebrow">Community Memories</span><h2 id="memoryManagerTitle">Adventure Photos</h2></div>' +
        '<button class="secondary" type="button" onclick="closeMemoryManager()">Close</button>' +
      '</div>' +
      '<div class="memory-upload-panel">' +
        '<div><label for="memoryUploadFile">Add a Photo</label><p class="meta">JPG, PNG, or WebP up to 8 MB.</p></div>' +
        '<input id="memoryUploadFile" type="file" accept="image/jpeg,image/png,image/webp" onchange="previewMemoryUpload()">' +
        '<div id="memoryUploadPreview" class="memory-upload-preview"><span class="memory-upload-icon">' + getDashboardIcon('camera') + '</span><strong>Select a photo</strong></div>' +
        '<label for="memoryUploadCaption">Caption</label>' +
        '<input id="memoryUploadCaption" maxlength="240" placeholder="What was happening in this moment?">' +
        '<button id="memoryUploadButton" class="primary" type="button" onclick="uploadCommunityMemory()">Add Memory Photo</button>' +
      '</div>' +
      '<div id="memoryManagerList" class="memory-manager-grid"><div class="notice">Loading memories...</div></div>' +
    '</div>';

  wrapper.addEventListener('click', function(event) {
    if (event.target === wrapper) closeMemoryManager();
  });

}

function closeMemoryManager() {
  var modal = document.getElementById('memoryManagerModal');
  if (modal) modal.classList.add('hidden');
  var input = document.getElementById('memoryUploadFile');
  if (input) input.value = '';
  setVal('memoryUploadCaption', '');
  var preview = document.getElementById('memoryUploadPreview');
  if (preview) preview.innerHTML = '<span class="memory-upload-icon">' + getDashboardIcon('camera') + '</span><strong>Select a photo</strong>';
  CURRENT_MEMORY_EVENT_ID = '';
  CURRENT_MEMORY_EVENT_TITLE = '';
}

function loadMemoryManager() {
  setBuilderPreviewText('memoryManagerTitle', CURRENT_MEMORY_EVENT_TITLE + ' Memories');
  var list = document.getElementById('memoryManagerList');
  if (list) list.innerHTML = '<div class="notice">Loading memories...</div>';

  google.script.run
    .withSuccessHandler(renderMemoryManager)
    .withFailureHandler(showError)
    .listEventMemoriesForAdmin(CURRENT_MEMORY_EVENT_ID);
}

function previewMemoryUpload() {
  var input = document.getElementById('memoryUploadFile');
  var preview = document.getElementById('memoryUploadPreview');
  if (!input || !preview || !input.files || !input.files.length) return;

  var file = input.files[0];
  if (file.size > 8 * 1024 * 1024) {
    showAppMessage('Photo Too Large', 'Choose a photo smaller than 8 MB.');
    input.value = '';
    return;
  }

  var reader = new FileReader();
  reader.onload = function() {
    preview.innerHTML = '<img src="' + escapeAttr(reader.result) + '" alt="Memory preview">';
  };
  reader.readAsDataURL(file);
}

function uploadCommunityMemory() {
  var input = document.getElementById('memoryUploadFile');
  var button = document.getElementById('memoryUploadButton');

  if (!input || !input.files || !input.files.length) {
    showAppMessage('Photo Required', 'Choose a photo to add to this adventure.');
    return;
  }

  var file = input.files[0];
  var reader = new FileReader();

  if (button) {
    button.disabled = true;
    button.textContent = 'Uploading...';
  }

  reader.onload = function() {
    google.script.run
      .withSuccessHandler(function(response) {
        if (button) {
          button.disabled = false;
          button.textContent = 'Add Memory Photo';
        }

        input.value = '';
        setVal('memoryUploadCaption', '');
        var preview = document.getElementById('memoryUploadPreview');
        if (preview) preview.innerHTML = '<span class="memory-upload-icon">' + getDashboardIcon('camera') + '</span><strong>Select a photo</strong>';

        showToastMessage(response && response.message ? response.message : 'Memory photo added.');
        loadMemoryManager();
      })
      .withFailureHandler(function(error) {
        if (button) {
          button.disabled = false;
          button.textContent = 'Add Memory Photo';
        }
        showError(error);
      })
      .uploadEventMemory(
        CURRENT_MEMORY_EVENT_ID,
        {
          fileName: file.name,
          mimeType: file.type,
          base64: reader.result
        },
        val('memoryUploadCaption')
      );
  };

  reader.onerror = function() {
    if (button) {
      button.disabled = false;
      button.textContent = 'Add Memory Photo';
    }
    showError(new Error('The photo could not be read.'));
  };

  reader.readAsDataURL(file);
}

function copyAdventureContent(kind, eventId) {
  google.script.run
    .withSuccessHandler(function(event) {

    })

function buildAdventureShareText(kind, event) {
  var title = String(event.Title || 'Community Connections Adventure');
  var date = formatDate(event.StartDate);
  var time = formatTime(event.StartTime);
  var location = String(event.LocationName || '');
  var address = String(event.Address || '');
  var cost = getCostLabel(event) || 'See adventure details';
  var description = String(event.Description || '').trim();
  var bring = String(event.WhatToBring || '').trim();
  var registration = event.RegistrationLink
    ? '\nRegister here: ' + event.RegistrationLink
    : '';

  var disclaimer =
    '\n\nThis is a member-organized Community Connections activity and is not facilitated, monitored, or organized by IWP staff.';

  if (kind === 'reminder') {
    return '⏰ ADVENTURE REMINDER\n\n' +
      title + '\n' +
      '📅 ' + date + (time ? ' at ' + time : '') + '\n' +
      (location ? '📍 ' + location + (address ? ', ' + address : '') + '\n' : '') +
      (bring ? '\nPlease remember to bring:\n' + bring + '\n' : '') +
      '\nWe are looking forward to seeing everyone!' +
      registration + disclaimer;
  }

  if (kind === 'thanks') {
    return 'THANK YOU! 💚\n\n' +
      'Thank you to everyone who joined us for ' + title + '. ' +
      'The adventure may be over, but the connections made are what Community Connections is all about.\n\n' +
      'We hope to see you at another adventure soon.\n\nYou Are Not Alone.';
  }

  if (kind === 'post') {
    return '🌟 NEW COMMUNITY CONNECTIONS ADVENTURE 🌟\n\n' +
      title + '\n\n' +
      (description ? description + '\n\n' : '') +
      '📅 ' + date + (time ? ' at ' + time : '') + '\n' +
      (location ? '📍 ' + location + '\n' : '') +
      '💵 ' + cost +
      registration +
      '\n\nCome as you are, meet people who understand, and find your next adventure.' +
      disclaimer;
  }

  return title + '\n\n' +
    (description ? description + '\n\n' : '') +
    'DATE: ' + date + (time ? '\nTIME: ' + time : '') + '\n' +
    (location ? 'LOCATION: ' + location + (address ? '\nADDRESS: ' + address : '') + '\n' : '') +
    'COST: ' + cost + '\n\n' +
    (event.WhatToExpect ? 'WHAT TO EXPECT:\n' + event.WhatToExpect + '\n\n' : '') +
    (bring ? 'WHAT TO BRING:\n' + bring + '\n\n' : '') +
    (event.Provided ? 'PROVIDED:\n' + event.Provided + '\n\n' : '') +
    (event.SpecialNotes ? 'SPECIAL NOTES:\n' + event.SpecialNotes : '') +
    registration + disclaimer;
}

function getAdventureCopySuccessMessage(kind) {
  if (kind === 'reminder') return 'Reminder copied.';
  if (kind === 'thanks') return 'Thank-you post copied.';
  if (kind === 'post') return 'Facebook post copied.';
  return 'Facebook event text copied.';
}

function copyTextToClipboard(text, successMessage) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToastMessage(successMessage || 'Copied.');
    }).catch(function() {
      fallbackCopyText(text, successMessage);
    });
  } else {
    fallbackCopyText(text, successMessage);
  }
}

function fallbackCopyText(text, successMessage) {
  var area = document.createElement('textarea');
  area.value = text;
  area.setAttribute('readonly', '');
  area.style.position = 'fixed';
  area.style.opacity = '0';
  document.body.appendChild(area);
  area.select();

  try {
    document.execCommand('copy');
    showToastMessage(successMessage || 'Copied.');
  } catch (error) {
    showAppMessage('Copy Failed', 'The text could not be copied automatically. Please try again.');
  }

  document.body.removeChild(area);
}

function showRegistration(eventId) {
  window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
  setRegistrationRouteMode(true);
  hideAllViews();
  hideLoading();

  var view = document.getElementById('registrationView');
  if (view) view.classList.remove('hidden');

  showRegistrationFormPanel();
  resetRegistrationForm();
  setVal('registrationEventId', eventId);

  var header = document.getElementById('registrationHeader');
  if (header) {
    header.innerHTML = buildRegistrationLoadingState();
  }

  // First try the full registration data. If that fails, fall back to the event record
  // so the form does not sit locked on Loading Registration.
  google.script.run
    .withSuccessHandler(function(data) {
      drawRegistrationForm(data);
    })
    .withFailureHandler(function(error) {
      google.script.run
        .withSuccessHandler(function(event) {
          drawRegistrationForm({ event: event, registrations: [], spotsTaken: 0, spotsRemaining: null });
          showInlineRegistrationError('Registration loaded with limited details. You can still complete the form.');
        })
        .withFailureHandler(function(secondError) {
          if (header) {
            header.innerHTML = '<div class="notice"><strong>Could not load registration.</strong><br>' + escapeHtml(getErrorMessage(error)) + '</div>';
          }
          showInlineRegistrationError(getErrorMessage(secondError || error));
        })
        .getEvent(eventId, true);
    })
    .getRegistrationPageData(eventId);
}

function showRegistrationFormPanel() {
  var formCard = document.getElementById('registrationFormCard');
  var successCard = document.getElementById('registrationSuccessCard');
  if (formCard) formCard.classList.remove('hidden');
  if (successCard) successCard.classList.add('hidden');
}

function resetRegistrationForm() {
  var form = document.getElementById('registrationForm');
  if (form) form.reset();
  setVal('adultCount', '1');
  setVal('childCount', '0');
}

function updateGuestNameSections() {
  var adultCount = Number(val('adultCount') || 0);
  var childCount = Number(val('childCount') || 0);
  var event = window.CURRENT_REGISTRATION_EVENT || {};
  var childrenAllowed = toBool(event.ChildrenAllowed);

  toggleElement('adultGuestNamesSection', adultCount > 1);
  toggleElement('childNamesSection', childrenAllowed && childCount > 0);

  var adultHelp = document.getElementById('adultGuestNamesHelp');
  if (adultHelp) {
    adultHelp.textContent = adultCount > 1
      ? 'Enter the name of each additional adult, one per line.'
      : '';
  }

  var childHelp = document.getElementById('childNamesHelp');
  if (childHelp) {
    childHelp.textContent = childCount > 0
      ? 'Enter each child name, one per line.'
      : '';
  }
}

function countNonBlankLines(text) {
  return String(text || '')
    .split(/\r?\n/)
    .map(function(line) { return line.trim(); })
    .filter(function(line) { return line.length > 0; })
    .length;
}

function setupRegistrationValidation() {
  var form = document.getElementById('registrationForm');
  if (form && !form.dataset.validationBound) {
    form.addEventListener('input', updateRegistrationButtonState);
    form.addEventListener('change', updateRegistrationButtonState);
    form.dataset.validationBound = 'true';
  }

  var ids = [
    'regName', 'regEmail', 'regPhone', 'adultCount', 'childCount',
    'emergencyContactName', 'emergencyContactPhone', 'paymentMethod', 'adultGuestNames', 'childNames',
    'ackMemberOrganized', 'ackVoluntary', 'ackRespect', 'ackPayment', 'ackRefund'
  ];

  ids.forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.oninput = function() { updateGuestNameSections(); updateRegistrationButtonState(); };
    el.onchange = function() { updateGuestNameSections(); updateRegistrationButtonState(); };
  });

  var adultCount = document.getElementById('adultCount');
  if (adultCount) {
    adultCount.oninput = function() { updateGuestNameSections(); updateRegistrationButtonState(); };
    adultCount.onchange = function() { updateGuestNameSections(); updateRegistrationButtonState(); };
  }

  var childCount = document.getElementById('childCount');
  if (childCount) {
    childCount.oninput = function() { updateGuestNameSections(); updateRegistrationButtonState(); };
    childCount.onchange = function() { updateGuestNameSections(); updateRegistrationButtonState(); };
  }
}

function getRegistrationValidationErrors() {
  var event = window.CURRENT_REGISTRATION_EVENT || {};
  var errors = [];
  var paid = toBool(event.PaidEvent);

  if (!val('regName')) errors.push('Name is required.');
  if (!val('regEmail') && !val('regPhone')) errors.push('Email or phone is required.');
  if (val('regEmail') && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val('regEmail'))) errors.push('Enter a valid email address.');
  if (val('regPhone') && String(val('regPhone')).replace(/\D/g, '').length < 7) errors.push('Enter a valid phone number.');
  var adultCount = Number(val('adultCount') || 0);
  var childCount = Number(val('childCount') || 0);

  if (adultCount < 1) errors.push('At least one adult is required.');
  if (adultCount > 1 && countNonBlankLines(val('adultGuestNames')) < adultCount - 1) {
    errors.push('Please enter the name of each additional adult.');
  }
  if (toBool(event.ChildrenAllowed) && childCount > 0 && countNonBlankLines(val('childNames')) < childCount) {
    errors.push('Please enter the name of each child attending.');
  }

  var paymentSection = document.getElementById('paymentSection');
  var paymentVisible = paymentSection && !paymentSection.classList.contains('hidden');
  if (paid && paymentVisible && !val('paymentMethod')) errors.push('Payment method is required.');

  if (!chk('ackMemberOrganized')) errors.push('Member-organized acknowledgement is required.');
  if (!chk('ackVoluntary')) errors.push('Voluntary participation acknowledgement is required.');
  if (!chk('ackRespect')) errors.push('Courtesy and respect acknowledgement is required.');

  if (paid && !chk('ackPayment')) errors.push('Payment acknowledgement is required.');
  if (paid && !chk('ackRefund')) errors.push('Refund acknowledgement is required.');

  return errors;
}

function updateRegistrationButtonState() {
  var button = document.getElementById('completeRegistrationBtn');
  var help = document.getElementById('registrationRequiredHelp');
  var title = document.getElementById('registrationReadyTitle');
  if (!button) return;

  var errors = getRegistrationValidationErrors();
  button.disabled = errors.length > 0;

  var contactComplete = Boolean(val('regName')) && Boolean(val('regEmail') || val('regPhone')) && Number(val('adultCount') || 0) >= 1;
  var paymentComplete = !toBool((window.CURRENT_REGISTRATION_EVENT || {}).PaidEvent) || Boolean(val('paymentMethod'));
  var acknowledgementsComplete =
    chk('ackMemberOrganized') &&
    chk('ackVoluntary') &&
    chk('ackRespect') &&
    (!toBool((window.CURRENT_REGISTRATION_EVENT || {}).PaidEvent) || (chk('ackPayment') && chk('ackRefund')));

  setRegistrationProgressStep('registrationStep1', contactComplete);
  setRegistrationProgressStep('registrationStep2', paymentComplete);
  setRegistrationProgressStep('registrationStep3', acknowledgementsComplete);

  if (title) {
    title.textContent = errors.length > 0 ? 'Complete the required information' : 'Ready to register';
  }

  if (help) {
    help.textContent = errors.length > 0
      ? errors[0]
      : 'Everything is complete. Submit your registration when ready.';
  }
}

function setRegistrationProgressStep(id, complete) {
  var step = document.getElementById(id);
  if (!step) return;
  step.classList.toggle('is-complete', Boolean(complete));
}

function submitRegistration() {
  var event = window.CURRENT_REGISTRATION_EVENT || {};
  var eventId = val('registrationEventId');
  var errors = getRegistrationValidationErrors();

  if (errors.length > 0) {
    showInlineRegistrationError(errors[0]);
    updateRegistrationButtonState();
    return;
  }

  var button = document.getElementById('completeRegistrationBtn');
  if (button) {
    button.disabled = true;
    button.textContent = 'Submitting...';
  }

  var data = {
    name: val('regName'),
    email: val('regEmail'),
    phone: val('regPhone'),
    adultCount: val('adultCount'),
    childCount: val('childCount'),
    adultGuestNames: val('adultGuestNames'),
    childNames: val('childNames'),
    emergencyContactName: val('emergencyContactName'),
    emergencyContactPhone: val('emergencyContactPhone'),
    paymentMethod: val('paymentMethod'),
    showNameOnAttendeeList: chk('showNameOnAttendeeList'),
    acknowledgementMemberOrganized: chk('ackMemberOrganized'),
    acknowledgementVoluntary: chk('ackVoluntary'),
    acknowledgementRespect: chk('ackRespect'),
    acknowledgementPayment: chk('ackPayment'),
    acknowledgementRefund: chk('ackRefund'),
    notes: val('regNotes')
  };

  google.script.run
    .withSuccessHandler(function (response) {
      if (button) {
        button.disabled = false;
        button.textContent = 'Complete Registration';
      }
      showRegistrationSuccess(event, response);
    })
    .withFailureHandler(function(error) {
      if (button) {
        button.disabled = false;
        button.textContent = 'Complete Registration';
      }
      showInlineRegistrationError(getErrorMessage(error));
    })
    .createRegistration(eventId, data);
}

function showInlineRegistrationError(message) {
  var box = document.getElementById('registrationError');
  if (!box) {
    showAppMessage('Registration Error', message || 'Registration could not be submitted.');
    return;
  }
  box.classList.remove('hidden');
  box.innerHTML = escapeHtml(message || 'Registration could not be submitted.');
}

function buildPaymentInstructions(event) {
  var lines = [];
  if (event.AdultCost) lines.push('Adult cost: ' + escapeHtml(event.AdultCost));
  if (event.ChildCost) lines.push('Child cost: ' + escapeHtml(event.ChildCost));
  if (toBool(event.VenmoEnabled)) lines.push('Venmo: ' + escapeHtml(event.VenmoHandle || 'See organizer'));
  if (toBool(event.CashAppEnabled)) lines.push('Cash App: ' + escapeHtml(event.CashAppHandle || 'See organizer'));
  if (toBool(event.CashEnabled)) lines.push('Cash may be paid directly to the organizer.');
  if (toBool(event.PayAtEventEnabled)) lines.push('Payment may be collected the day of the event.');
  if (toBool(event.BuyOwnTicketsEnabled)) {
    if (event.TicketPurchaseLink) {
      lines.push('Participants buy their own tickets. <a href="' + escapeAttr(event.TicketPurchaseLink) + '" target="_blank">Purchase tickets here</a>');
    } else {
      lines.push('Participants buy their own tickets.');
    }
  }
  return lines.join('<br>') || 'Payment details will be provided by the organizer.';
}

function drawRegistrationList(data) {
  data = data || {};
  LAST_REGISTRATION_LIST_DATA = data;
  REGISTRATION_MANAGER_FILTERS = { search: '', status: '', payment: '' };

  setVal('registrationManagerSearch', '');
  setVal('registrationManagerStatus', '');
  setVal('registrationManagerPayment', '');

  var event = data.event || {};
  var registrations = data.registrations || [];
  var title = document.getElementById('registrationListTitle');
  var summary = document.getElementById('registrationListSummary');

  if (title) title.textContent = event.Title || 'Adventure Registrations';
  if (summary) {
    summary.textContent =
      formatDate(event.StartDate) +
      (event.StartTime ? ' · ' + formatTime(event.StartTime) : '') +
      (event.LocationName ? ' · ' + event.LocationName : '');
  }

  renderRegistrationManagerStats(registrations, data.totalPeople || 0);
  renderRegistrationManagerRows(registrations);
}

function renderRegistrationManagerStats(registrations, totalPeople) {
  var stats = document.getElementById('registrationManagerStats');
  if (!stats) return;

  registrations = registrations || [];
  var confirmed = registrations.filter(function(r) {
    var status = String(r.Status || '').toLowerCase();
    return status !== 'cancelled' && status !== 'waitlist' && status !== 'waitlisted';
  }).length;
  var waitlisted = registrations.filter(function(r) {
    var status = String(r.Status || '').toLowerCase();
    return status === 'waitlist' || status === 'waitlisted';
  }).length;
  var paid = registrations.filter(function(r) {
    return String(r.PaymentStatus || '').toLowerCase() === 'paid';
  }).length;
  var pending = registrations.filter(function(r) {
    return String(r.PaymentStatus || '').toLowerCase() === 'pending';
  }).length;
  var checkedIn = registrations.filter(function(r) {
    return String(r.Status || '').toLowerCase() === 'checked in';
  }).length;

  stats.innerHTML =
    registrationManagerStat('people', totalPeople, 'People') +
    registrationManagerStat('task', confirmed, 'Active') +
    registrationManagerStat('waitlist', waitlisted, 'Waitlisted') +
    registrationManagerStat('payment', paid, 'Paid') +
    registrationManagerStat('warning', pending, 'Payment Pending') +
    registrationManagerStat('location', checkedIn, 'Checked In');
}

function registrationManagerStat(iconName, value, label) {
  var icon = iconName === 'location' ? getMetaIcon('location') : getDashboardIcon(iconName);
  return '<div class="registration-stat-card"><span class="registration-stat-icon">' + icon + '</span><strong>' + escapeHtml(value) + '</strong><small>' + escapeHtml(label) + '</small></div>';
}

function getParticipantInitials(name) {
  var words = String(name || 'Community Member').trim().split(/\s+/).filter(Boolean);
  return ((words[0] || 'C').charAt(0) + (words.length > 1 ? words[words.length - 1].charAt(0) : '')).toUpperCase();
}

function filterRegistrationManager() {
  REGISTRATION_MANAGER_FILTERS = {
    search: String(val('registrationManagerSearch') || '').trim().toLowerCase(),
    status: String(val('registrationManagerStatus') || '').trim().toLowerCase(),
    payment: String(val('registrationManagerPayment') || '').trim().toLowerCase()
  };

  renderRegistrationManagerRows(
    (LAST_REGISTRATION_LIST_DATA && LAST_REGISTRATION_LIST_DATA.registrations) || []
  );
}

function clearRegistrationManagerFilters() {
  setVal('registrationManagerSearch', '');
  setVal('registrationManagerStatus', '');
  setVal('registrationManagerPayment', '');
  REGISTRATION_MANAGER_FILTERS = { search: '', status: '', payment: '' };
  renderRegistrationManagerRows(
    (LAST_REGISTRATION_LIST_DATA && LAST_REGISTRATION_LIST_DATA.registrations) || []
  );
}

function renderRegistrationManagerRows(registrations) {
  var body = document.getElementById('registrationListBody');
  if (!body) return;

  registrations = registrations || [];
  var filters = REGISTRATION_MANAGER_FILTERS || { search: '', status: '', payment: '' };

  var filtered = registrations.filter(function(r) {
    var haystack = [
      r.Name, r.Email, r.Phone, r.AdultGuestNames, r.ChildNames,
      r.EmergencyContactName, r.EmergencyContactPhone, r.Notes
    ].join(' ').toLowerCase();

    var status = String(r.Status || '').toLowerCase();
    var payment = String(r.PaymentStatus || '').toLowerCase();

    return (!filters.search || haystack.indexOf(filters.search) !== -1) &&
      (!filters.status || status === filters.status) &&
      (!filters.payment || payment === filters.payment);
  });

  var count = document.getElementById('registrationManagerFilterCount');
  if (count) {
    count.textContent = filtered.length + ' of ' + registrations.length +
      (registrations.length === 1 ? ' registration' : ' registrations') + ' shown';
  }

  var clearButton = document.getElementById('clearRegistrationFiltersButton');
  if (clearButton) {
    clearButton.classList.toggle(
      'hidden',
      !(filters.search || filters.status || filters.payment)
    );
  }

  if (!registrations.length) {
    body.innerHTML = buildEmptyState('people', 'No registrations yet', 'When people register, they will show up here.', false);
    return;
  }

  if (!filtered.length) {
    body.innerHTML = buildEmptyState('search', 'No matching registrations', 'Change or clear the search filters.', false);
    return;
  }

  var html =
    '<div class="registration-table-wrap registration-manager-table-wrap">' +
    '<table class="registration-table registration-manager-table">' +
    '<thead><tr>' +
      '<th>Participant</th><th>Attendance</th><th>Emergency Contact</th>' +
      '<th>Payment</th><th>Status</th><th>Organizer Notes</th><th>Actions</th>' +
    '</tr></thead><tbody>';

  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];

    html += '<tr>' +
      '<td data-label="Participant">' +
        '<div class="registration-participant">' +
          '<span class="registration-participant-avatar">' + escapeHtml(getParticipantInitials(r.Name)) + '</span>' +
          '<div class="registration-participant-copy">' +
            '<strong>' + escapeHtml(r.Name || 'Unnamed Participant') + '</strong>' +
            '<span class="registration-contact-line">' + escapeHtml(r.Email || '') + '</span>' +
            '<span class="registration-contact-line">' + escapeHtml(r.Phone || '') + '</span>' +
            '<span class="muted-small">' + escapeHtml(formatRegistrationDate(r.RegisteredAt)) + '</span>' +
          '</div>' +
        '</div>' +
      '</td>' +
      '<td data-label="Attendance">' +
        '<strong>' + escapeHtml(r.AdultCount || '0') + ' adult' + (Number(r.AdultCount || 0) === 1 ? '' : 's') + '</strong>' +
        (Number(r.ChildCount || 0) > 0
          ? '<span class="registration-contact-line">' + escapeHtml(r.ChildCount) + ' child' + (Number(r.ChildCount) === 1 ? '' : 'ren') + '</span>'
          : '') +
        (r.AdultGuestNames
          ? '<details><summary>Adult guests</summary><span class="muted-small">' + escapeHtml(r.AdultGuestNames) + '</span></details>'
          : '') +
        (r.ChildNames
          ? '<details><summary>Children</summary><span class="muted-small">' + escapeHtml(r.ChildNames) + '</span></details>'
          : '') +
      '</td>' +
      '<td data-label="Emergency Contact">' +
        (r.EmergencyContactName || r.EmergencyContactPhone
          ? '<strong>' + escapeHtml(r.EmergencyContactName || 'Emergency Contact') + '</strong>' +
            '<span class="registration-contact-line">' + escapeHtml(r.EmergencyContactPhone || '') + '</span>'
          : '<span class="muted-small">Not provided</span>') +
      '</td>' +
      '<td data-label="Payment">' +
        '<select class="registration-status-select" onchange="updatePaymentFromRegistrationList(\'' +
          escapeJs(r.RegistrationId) + '\', this.value)">' +
          buildPaymentStatusOptions(r.PaymentStatus) +
        '</select>' +
        '<span class="muted-small">' + escapeHtml(r.PaymentMethod || '') + '</span>' +
      '</td>' +
      '<td data-label="Status"><span class="mini-badge ' + getRegistrationStatusBadgeClass(r.Status) + '">' +
        escapeHtml(r.Status || '') + '</span></td>' +
      '<td data-label="Organizer Notes">' +
        (r.Notes ? '<span>' + escapeHtml(r.Notes) + '</span>' : '<span class="muted-small">No notes</span>') +
      '</td>' +
      '<td data-label="Actions"><div class="registration-row-actions">' +
        buildRegistrationActionButtons(r) +
        (r.Email ? '<a class="button-link secondary compact" href="mailto:' + escapeAttr(r.Email) + '">Email</a>' : '') +
        (r.Phone ? '<a class="button-link secondary compact" href="tel:' + escapeAttr(r.Phone) + '">Call</a>' : '') +
      '</div></td>' +
    '</tr>';
  }

  html += '</tbody></table></div>';
  body.innerHTML = html;

function getRegistrationStatusBadgeClass(status) {

function exportRegistrationCsv() {
  var data = LAST_REGISTRATION_LIST_DATA || {};
  var event = data.event || {};
  var registrations = data.registrations || [];

  if (!registrations.length) {
    showAppMessage('Nothing to Export', 'There are no registrations for this adventure yet.');
    return;
  }

  var headers = ['Name','Email','Phone','Adults','Additional Adult Names','Children','Child Names','Payment Status','Payment Method','Status','Notes'];
  var rows = registrations.map(function(r) {
    return [
      r.Name || '',
      r.Email || '',
      r.Phone || '',
      r.AdultCount || '',
      r.AdultGuestNames || '',
      r.ChildCount || '',
      r.ChildNames || '',
      r.PaymentStatus || '',
      r.PaymentMethod || '',
      r.Status || '',
      r.Notes || ''
    ];
  });

  var csv = [headers].concat(rows).map(function(row) {
    return row.map(function(cell) {
      var text = String(cell == null ? '' : cell);
      return '"' + text.replace(/"/g, '""') + '"';
    }).join(',');
  }).join('\n');

  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = slugify(event.Title || 'registrations') + '-registrations.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function drawCheckInMode(data) {
  CURRENT_CHECKIN_DATA = data || {};

  var registrations = CURRENT_CHECKIN_DATA.registrations || [];
  var title = document.getElementById('checkInEventTitle');
  var summary = document.getElementById('checkInSummary');
  var checked = registrations.filter(function(r) { return String(r.Status || '').toLowerCase() === 'checked in'; }).length;
  var unpaid = registrations.filter(function(r) { return String(r.PaymentStatus || '').toLowerCase() !== 'paid'; }).length;
  var paid = Math.max(0, registrations.length - unpaid);
  var people = registrations.reduce(function(total, r) { return total + Number(r.AdultCount || 0) + Number(r.ChildCount || 0); }, 0);
  if (title) title.textContent = event.Title || 'Event Check-In';
  if (summary) summary.textContent = checked + ' of ' + registrations.length + ' registrations checked in · ' + people + ' people expected';
  setDashboardText('checkInTotalCount', registrations.length);
  setDashboardText('checkInPeopleCount', people);
  setDashboardText('checkInCheckedCount', checked);
  setDashboardText('checkInRemainingCount', Math.max(0, registrations.length - checked));
  setDashboardText('checkInUnpaidCount', unpaid);
  setDashboardText('checkInEventDate', formatDate(event.StartDate) || 'Date coming soon');
  setDashboardText('checkInEventTime', formatTime(event.StartTime) || 'Time coming soon');
  setDashboardText('checkInEventLocation', event.LocationName || event.Address || 'Location coming soon');
  configureEventDayLinks(event);
  var percent = registrations.length ? Math.round((checked / registrations.length) * 100) : 0;
  var paidPercent = registrations.length ? Math.round((paid / registrations.length) * 100) : 100;
  setDashboardText('checkInProgressLabel', percent + '% checked in');
  setDashboardText('checkInPaymentLabel', paidPercent + '% paid · ' + paid + ' of ' + registrations.length);
  var progressBar = document.getElementById('checkInProgressBar');
  if (progressBar) progressBar.style.width = percent + '%';
  var paymentBar = document.getElementById('checkInPaymentBar');
  if (paymentBar) paymentBar.style.width = paidPercent + '%';
  toggleElement('checkInAllClear', registrations.length > 0 && checked === registrations.length);
  loadEventDayNotes(event.EventId || CURRENT_DETAIL_EVENT_ID);
  loadEventDaySafetyChecklist(event.EventId || CURRENT_DETAIL_EVENT_ID);
  loadEventDayLog(event.EventId || CURRENT_DETAIL_EVENT_ID);
  loadEventDayCloseout(event.EventId || CURRENT_DETAIL_EVENT_ID);

  filterCheckInList();
}

function configureEventDayLinks(event) {

function setCheckInFilter(filter, button) {

  if (button) button.classList.add('is-active');
  filterCheckInList();
